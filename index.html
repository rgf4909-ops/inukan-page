<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIKAN-UIN ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');

        :root {
            --bg-color: #080808; --kakao-yellow: #fae100; --kakao-dark: #2a2a2a;
            --xp-blue: linear-gradient(to bottom, #0058e4 0%, #3b8df5 10%, #0058e4 100%);
            --wmp-bg: #d4d0c8; --wmp-border: #808080;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-color); color: #eee; font-family: 'Tahoma', 'Noto Sans KR', 'Gulim', sans-serif; overflow: hidden; user-select: none; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.08; pointer-events: none; z-index: 9999; }
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.6) 100%); pointer-events: none; z-index: 9998; }
        
        .bg-container { position: fixed; top: 0; right: 0; width: 75%; height: 100%; z-index: 1; }
        .bg-image { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.85); }
        .fade-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to right, #080808 0%, #080808 20%, transparent 80%); z-index: 2; }

        /* 대각선 카톡 루프 복구 */
        .chat-stream { position: fixed; top: -45%; left: -5%; width: 55%; height: 200%; transform: rotate(25deg); z-index: 3; overflow: hidden; pointer-events: none; mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent); }
        .chat-track { display: flex; flex-direction: column; gap: 50px; padding: 150px; animation: scrollUp 180s linear infinite; }
        @keyframes scrollUp { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        .date-line { text-align: center; margin: 20px 0; }
        .date-line span { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color: #ccc; }
        .chat-item { display: flex; width: 100%; align-items: flex-start; }
        .chat-item.left { justify-content: flex-start; }
        .chat-item.right { justify-content: flex-end; }
        .profile-box { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .profile-img { width: 45px; height: 45px; border-radius: 18px; background: #111; overflow: hidden; border: 1px solid #333; }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-size: 0.7rem; color: #666; }
        .bubble-container { max-width: 65%; margin: 0 12px; }
        .kakao-bubble { padding: 10px 14px; border-radius: 14px; font-size: 0.95rem; line-height: 1.4; box-shadow: 2px 2px 8px rgba(0,0,0,0.4); }
        .left .kakao-bubble { background: var(--kakao-dark); color: #ccc; border-top-left-radius: 2px; }
        .right .kakao-bubble { background: var(--kakao-yellow); color: #111; border-top-right-radius: 2px; }

        /* 공통 윈도우 스타일 */
        .draggable { position: absolute; }
        .xp-window { background: #ece9d8; border: 3px solid #0054e3; border-radius: 8px 8px 0 0; display: flex; flex-direction: column; box-shadow: 10px 10px 30px rgba(0,0,0,0.5); z-index: 100; }
        .xp-title-bar { background: var(--xp-blue); height: 30px; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; color: white; font-weight: bold; font-size: 0.85rem; cursor: move; }
        .xp-close-btn { width: 21px; height: 21px; background: #e91e63; border: 1px solid white; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; }

        /* WMP 플레이어 */
        .wmp-player { position: fixed; bottom: 30px; right: 30px; width: 320px; height: 480px; background: var(--wmp-bg); border: 2px solid #808080; z-index: 1000; display: flex; flex-direction: column; }
        .wmp-title { background: linear-gradient(to right, #000080, #1084d0); height: 22px; padding: 0 5px; display: flex; align-items: center; color: white; font-size: 0.75rem; font-weight: bold; gap: 5px; cursor: move; }
        .wmp-menu { color: black; font-size: 11px; padding: 2px 5px; }
        .wmp-screen { flex: 1; background: black; margin: 5px; border: 2px inset #808080; position: relative; overflow: hidden; }
        .album-cover { width: 100%; height: 200px; object-fit: cover; }
        .wmp-info-panel { height: 120px; background: black; color: #00ff00; font-family: 'Gulim', monospace; font-size: 0.7rem; padding: 10px; border-top: 1px solid #444; line-height: 1.6; }
        .wmp-buttons { display: flex; gap: 5px; margin: 5px; }
        .wmp-btn { background: #ece9d8; border: 2px outset #fff; width: 30px; height: 25px; display: flex; align-items: center; justify-content: center; color: black; cursor: pointer; }
        .wmp-btn:active { border-style: inset; }

        /* 바탕화면 아이콘 */
        .desktop-icons { position: fixed; bottom: 40px; left: 50px; display: flex; gap: 40px; z-index: 10; }
        .icon-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .icon-img { width: 55px; height: 55px; margin-bottom: 8px; filter: drop-shadow(2px 2px 2px black); }
        .icon-label { font-size: 0.85rem; color: white; text-shadow: 2px 2px 4px black; }

        /* 탐색기 */
        #xpExplorer { top: 80px; left: 20%; width: 900px; height: 650px; display: none; }
        .xp-menubar { background: #ece9d8; padding: 2px 8px; font-size: 0.75rem; color: black; display: flex; gap: 15px; border-bottom: 1px solid #fff; }
        .xp-toolbar { background: #ece9d8; padding: 4px 8px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #d4d0c8; }
        .xp-toolbar-btn { display: flex; align-items: center; gap: 4px; padding: 4px 8px; cursor: pointer; color: black; font-size: 0.8rem; border: 1px solid transparent; }
        .xp-toolbar-btn:hover { border: 1px solid #707070; box-shadow: inset 1px 1px #fff, inset -1px -1px #808080; }
        .xp-addressbar { background: #ece9d8; padding: 4px 8px; display: flex; align-items: center; gap: 10px; color: black; font-size: 0.8rem; border-bottom: 1px solid #808080; }
        .address-input-box { flex: 1; background: white; border: 2px inset #d4d0c8; display: flex; align-items: center; padding: 2px 5px; height: 24px; }
        
        .xp-body { display: flex; flex: 1; overflow: hidden; background: #fff; }
        .xp-sidebar { width: 220px; background: linear-gradient(to bottom, #748aff 0%, #4a67ed 100%); padding: 12px; border-right: 1px solid #0054e3; overflow-y: auto; }
        .sidebar-panel { background: white; border-radius: 3px; margin-bottom: 15px; overflow: hidden; font-family: 'Gulim'; }
        .sidebar-header { background: linear-gradient(to right, #ffffff, #c4d5fd); color: #2151dc; font-weight: bold; padding: 5px 10px; font-size: 0.75rem; }
        .sidebar-content { padding: 10px; background: #d3e5fa; font-size: 0.75rem; display: flex; flex-direction: column; gap: 8px; }
        .sidebar-item { display: flex; align-items: center; gap: 6px; color: #2151dc; cursor: pointer; }
        .sidebar-item:hover { text-decoration: underline; color: #428eff; }
        .sidebar-item img { width: 14px; height: 14px; }

        .xp-main-view { flex: 1; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); grid-auto-rows: min-content; gap: 15px; overflow-y: auto; background: white; }
        .file-icon { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; cursor: pointer; padding: 8px; border: 1px solid transparent; }
        .file-icon.selected { background: #316ac5; outline: 1px dotted #808080; }
        .file-icon img { width: 48px; height: 48px; }
        .file-icon.selected img { filter: brightness(0.8) sepia(1) hue-rotate(180deg) saturate(3); }
        .file-name { font-size: 0.75rem; color: black; line-height: 1.2; word-break: break-all; padding: 2px 4px; }
        .file-icon.selected .file-name { color: white; background: #000; }
        
        .inline-rename-input { font-family: 'Gulim'; font-size: 0.75rem; text-align: center; padding: 1px; border: 1px solid black; background: white; color: black; width: 90px; outline: none; }

        .xp-popup { z-index: 500; display: block; border: 3px solid #0054e3; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        .xp-popup-body { background: #ece9d8; padding: 20px; color: black; font-size: 0.85rem; }
        .xp-btn { background: #ece9d8; border: 1px solid #707070; padding: 3px 20px; font-size: 0.8rem; box-shadow: inset 1px 1px #fff; cursor: pointer; color: black; margin: 0 5px; }
    </style>
</head>
<body onload="window.init()">

    <div class="vignette"></div>
    <div class="bg-container"><img src="https://img1.daumcdn.net/thumb/R1280x0/?scode=mtistory2&fname=https%3A%2F%2Fblog.kakaocdn.net%2Fdna%2Fbo0278%2FdJMcafL32e7%2FAAAAAAAAAAAAAAAAAAAAABlHjiaQc4NH3u1mNQVjRHfd-DvmuBcNJd2YohedpmLn%2Fimg.png%3Fcredential%3DyqXZFxpELC7KVnFOS48ylbz2pIh7yKj8%26expires%3D1774969199%26allow_ip%3D%26allow_referer%3D%26signature%3DmsuoDZ%252FDOFMkyKffXpYXOGq0wjg%253D" class="bg-image"><div class="fade-overlay"></div></div>

    <div class="chat-stream"><div class="chat-track" id="chatTrack"></div></div>

    <div class="desktop-icons">
        <div class="icon-item" onclick="window.openExplorer('folder-text', '로컬 디스크 (C:) \\ 기록 아카이브')"><img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png" class="icon-img"><span class="icon-label">기록 폴더</span></div>
        <div class="icon-item" onclick="window.openExplorer('folder-photos', '로컬 디스크 (C:) \\ 사진첩')"><img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png" class="icon-img"><span class="icon-label">사진첩</span></div>
        <div class="icon-item" onclick="window.openExplorer('trash', '휴지통')"><img src="https://win98icons.alexmeub.com/icons/png/recycle_bin_empty-4.png" class="icon-img"><span class="icon-label">휴지통</span></div>

    <div class="wmp-player draggable" id="wmpPlayer" data-x="0" data-y="0">
        <div class="wmp-title drag-handle"><img src="https://win98icons.alexmeub.com/icons/png/mmsys_cp-0.png" style="width:14px;"> Windows Media Player</div>
        <div class="wmp-menu">파일(F) 보기(V) 재생(P) 도움말(H)</div>

            <img src="https://image.bugsm.co.kr/album/images/200/203296/20329614.jpg?version=20250404015924" class="album-cover">

        </div>
        <div style="width:100%; height:8px; background:#808080; border:1px inset #fff;"></div>

            <div class="wmp-btn" onclick="window.stopMusic()"><i class="fas fa-stop"></i></div>

    <div id="virusPopups"></div>

    <div id="xpExplorer" class="xp-window draggable" data-x="0" data-y="0">
        <div class="xp-title-bar drag-handle">
            <div style="display:flex; align-items:center; gap:8px;"><img src="https://win98icons.alexmeub.com/icons/png/directory_closed-0.png" style="width:16px;"><span id="explorerTitle">로컬 디스크 (C:)</span></div>
            <div class="xp-close-btn" onclick="window.closeExplorer()">✕</div>
        </div>
        <div class="xp-menubar"><span>파일(F)</span><span>편집(E)</span><span>보기(V)</span><span>즐겨찾기(A)</span><span>도구(T)</span><span>도움말(H)</span></div>
        <div class="xp-toolbar">
            <div class="xp-toolbar-btn" onclick="window.goBack()"><img src="https://win98icons.alexmeub.com/icons/png/back-0.png" width="22"> <span>뒤로</span></div>
            <div class="xp-toolbar-btn"><img src="https://win98icons.alexmeub.com/icons/png/search_file-0.png" width="22"> <span>검색</span></div>
        </div>
        <div class="xp-addressbar">
            <span>주소(D)</span>
            <div class="address-input-box"><img src="https://win98icons.alexmeub.com/icons/png/directory_closed-0.png" width="16" style="margin-right:5px;"><span id="addressPath" style="flex:1;">C:\</span></div>
        </div>
        <div class="xp-body">
            <div class="xp-sidebar">
                <div class="sidebar-panel">
                    <div class="sidebar-header">파일 및 폴더 작업</div>
                    <div class="sidebar-content">
                        <div class="sidebar-item" onclick="window.addNewFolder()"><img src="https://win98icons.alexmeub.com/icons/png/directory_closed-0.png"> 새 폴더 만들기</div>
                        <div class="sidebar-item" onclick="window.triggerAddFile()"><img src="https://win98icons.alexmeub.com/icons/png/write_wordpad-0.png"> 이 폴더에 새 파일 만들기</div>
                        <div class="sidebar-item" onclick="window.renameSelectedItem()"><img src="https://win98icons.alexmeub.com/icons/png/rename-0.png"> 이 항목 이름 바꾸기</div>
                        <div class="sidebar-item" onclick="window.deleteSelectedItem()"><img src="https://win98icons.alexmeub.com/icons/png/msg_error-0.png"> 이 항목 삭제</div>
                    </div>

            </div>
            <div class="xp-main-view" id="explorerView" onclick="window.clearSelection(event)"></div>
        </div>
    </div>

    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAzy2_YfNKk2vPzU6l1AwjCC1_TepXYAsU", authDomain: "inukan-19e53.firebaseapp.com", projectId: "inukan-19e53", storageBucket: "inukan-19e53.firebasestorage.app", messagingSenderId: "1035051352954", appId: "1:1035051352954:web:a06a37592846ac41710cc3" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db; window.addDoc = addDoc; window.getDocs = getDocs; window.deleteDoc = deleteDoc; window.updateDoc = updateDoc; window.doc = doc; window.collection = collection;

        window.config = {
            profiles: { jikan: "https://i.postimg.cc/wjYnMhTH/jikanpeusa.png", jiuin: "https://i.postimg.cc/QVGYB3D4/peusa.png" },
            chats: [ { type: 'date', text: "2024년 11월 17일" }, { sender: "지칸", text: "씨발. 진짜.. 너 어디냐.", side: "left" }, { sender: "지우인", text: "나 웃는 게 그렇게 싫어? 끓여준 게 어디야.", side: "right" }, { sender: "지칸", text: "여유 부리면서 쳐웃지 마라. 꼴받으니까.", side: "left" } ],
            folders: {
                'folder-text': [
                    { type: 'rp', title: "역극_3000개_백업.log", docId: 'doc-1', content: [{ name: "지우인", msg: "야, 거기 서.", side: "right" }] },
                    { type: 'txt', title: "기록_파편.txt", docId: 'doc-2', content: "모든 게 무너진 날의 기록.\n지칸은 더 이상 웃지 않았다." }
                ],
                'folder-photos': [{ type: 'img', title: "메모리_01.jpg", docId: 'doc-3', url: "https://images.unsplash.com/photo-1518562180175-34a163b1a9a6" }],
                'trash': [{ type: 'txt', title: "버려진_쪽지.txt", docId: 'doc-4', content: "재워주게?" }]
            }
        };

        window.currentActiveFolder = '';
        window.folderHistory = [];
        window.selectedFile = null;

        window.init = async function() {
            window.initDraggable();
            window.initChatLoop(); // 카톡 흘러가는 로직 다시 실행!
            window.spawnVirusPopups(); // 원하시던 기괴한 바이러스 팝업 띄우기
            try { await window.loadFilesFromFirebase(); } catch(e) {}
        };

        // --- 음악 플레이어 ---
        window.playMusic = function() {
            document.getElementById('musicFrame').src = "https://www.youtube.com/embed/XCliKS4XlWc?autoplay=1&mute=0&loop=1&playlist=XCliKS4XlWc";
        };
        window.stopMusic = function() {
            document.getElementById('musicFrame').src = "";
        };

        // --- 카톡 로직 ---
        window.initChatLoop = function() {
            const track = document.getElementById('chatTrack');
            track.innerHTML = '';
            const repeatedChats = Array(15).fill(window.config.chats).flat();
            repeatedChats.forEach(chat => {
                if (chat.type === 'date') {
                    const dl = document.createElement('div'); dl.className = 'date-line'; dl.innerHTML = `<span>${chat.text}</span>`; track.appendChild(dl);
                } else {
                    const item = document.createElement('div'); item.className = `chat-item ${chat.side}`;
                    const prof = `<div class="profile-box"><div class="profile-img"><img src="${chat.side === 'left' ? window.config.profiles.jikan : window.config.profiles.jiuin}"></div><span class="profile-name">${chat.sender}</span></div>`;
                    const bub = `<div class="bubble-container"><div class="kakao-bubble">${chat.text}</div></div>`;
                    item.innerHTML = chat.side === 'left' ? prof + bub : bub + prof; track.appendChild(item);
                }
            });
        };

        // --- 원조 바이러스 팝업 ---
        window.spawnVirusPopups = function() {
            const layer = document.getElementById('virusPopups');
            for(let i=0; i<3; i++) {
                const popup = document.createElement('div');
                popup.className = 'xp-window xp-popup draggable';
                popup.style.left = (Math.random() * 300 + 200) + 'px';
                popup.style.top = (Math.random() * 300 + 100) + 'px';
                popup.style.position = 'absolute';
                popup.innerHTML = `
                    <div class="xp-title-bar drag-handle"><span>경고 - 악성 코드 탐지</span><div class="xp-close-btn" onclick="this.closest('.xp-popup').remove()">✕</div></div>
                    <div class="xp-popup-body" style="display:flex; flex-direction:column; align-items:center; gap:10px;">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="https://win98icons.alexmeub.com/icons/png/msg_error-0.png" width="32">
                            <span style="font-weight:bold; color:red;">치명적인 오류 발생! 시스템이 손상되었습니다.</span>
                        </div>
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQIQI5LhhNayIsdpTHUWD7vUa1I0LFRhQSCpg&s" style="border: 2px solid #a0a0a0; max-width:100%;">
                    </div>
                    <div style="background:#ece9d8; padding:10px; display:flex; justify-content:center; gap:10px;">
                        <button class="xp-btn" onclick="this.closest('.xp-popup').remove()">무시</button>
                    </div>`;
                layer.appendChild(popup);
            }
        };

        // --- 파이어베이스 로드 ---
        window.loadFilesFromFirebase = async function() {
            const querySnapshot = await window.getDocs(window.collection(window.db, "files"));
            querySnapshot.forEach((d) => {
                const data = d.data(); data.docId = d.id;
                if(!window.config.folders[data.folder]) window.config.folders[data.folder] = [];
                if(!window.config.folders[data.folder].find(f => f.docId === data.docId)) window.config.folders[data.folder].push(data);
                if(data.type === 'folder' && !window.config.folders[data.id]) window.config.folders[data.id] = [];
            });
        };

        window.findFileByDocId = function(docId) {
            for (let folder in window.config.folders) {
                const found = window.config.folders[folder].find(f => f.docId === docId);
                if(found) return found;
            } return null;
        };

        // --- 🌟 인라인 이름 변경 (진짜 윈도우처럼!) ---
        window.inlineRename = function(fileObj, iconElement) {
            const nameSpan = iconElement.querySelector('.file-name');
            const oldName = fileObj.title;
            nameSpan.innerHTML = `<input type="text" class="inline-rename-input" value="${oldName}">`;
            
            const input = nameSpan.querySelector('input');
            input.focus();
            input.select();

            const finishRename = async () => {
                if(input.dataset.done) return;
                input.dataset.done = true;
                const newName = input.value.trim() || oldName;
                
                if(newName !== oldName && fileObj.docId && !fileObj.docId.startsWith('doc-')) {
                    try { await window.updateDoc(window.doc(window.db, "files", fileObj.docId), { title: newName }); } catch(e) {}
                }
                fileObj.title = newName;
                window.renderFiles(window.currentActiveFolder);
            };

            input.onblur = finishRename;
            input.onkeydown = (e) => {
                if(e.key === 'Enter') finishRename();
                if(e.key === 'Escape') { input.value = oldName; finishRename(); }
            };
        };

        // --- 폴더 및 파일 생성 (내용 묻지 않음, 빈 파일 생성) ---
        window.addNewFolder = async function() {
            const id = 'folder-' + Date.now();
            const newFolder = { type: 'folder', title: "새 폴더", id: id, folder: window.currentActiveFolder, createdAt: Date.now() };

            try {
                const docRef = await window.addDoc(window.collection(window.db, "files"), newFolder);
                newFolder.docId = docRef.id;
                if(!window.config.folders[id]) window.config.folders[id] = [];
                if(!window.config.folders[window.currentActiveFolder]) window.config.folders[window.currentActiveFolder] = [];
                window.config.folders[window.currentActiveFolder].push(newFolder);
                window.renderFiles(window.currentActiveFolder);
                
                setTimeout(() => {
                    const icons = document.querySelectorAll('#explorerView .file-icon');
                    if(icons.length > 0) {
                        const lastIcon = icons[icons.length - 1];
                        window.selectedFile = newFolder;
                        lastIcon.classList.add('selected');
                        window.inlineRename(newFolder, lastIcon);
                    }
                }, 100);
            } catch(e) { alert("저장 실패!"); }
        };

        window.triggerAddFile = async function() {
            // 현재 폴더가 사진첩(folder-photos) 하위인지 체크
            const isPhotoFolder = window.folderHistory.length > 0 && window.folderHistory[0].id === 'folder-photos';
            const defaultTitle = isPhotoFolder ? "새 이미지.jpg" : "새 텍스트 문서.txt";
            
            const newData = isPhotoFolder
                ? { type:'img', title: defaultTitle, url:'', folder: window.currentActiveFolder, createdAt: Date.now() }
                : { type:'txt', title: defaultTitle, content:'', folder: window.currentActiveFolder, createdAt: Date.now() };

            try {
                const docRef = await window.addDoc(window.collection(window.db, "files"), newData);
                newData.docId = docRef.id;
                if(!window.config.folders[window.currentActiveFolder]) window.config.folders[window.currentActiveFolder] = [];
                window.config.folders[window.currentActiveFolder].push(newData);
                window.renderFiles(window.currentActiveFolder);
                
                setTimeout(() => {
                    const icons = document.querySelectorAll('#explorerView .file-icon');
                    if(icons.length > 0) {
                        const lastIcon = icons[icons.length - 1];
                        window.selectedFile = newData;
                        lastIcon.classList.add('selected');
                        window.inlineRename(newData, lastIcon);
                    }
                }, 100);
            } catch(e) { alert("저장 실패!"); }
        };

        window.renameSelectedItem = function() {
            if(!window.selectedFile) return alert("이름을 바꿀 항목을 선택하세요.");
            const selectedEl = document.querySelector('.file-icon.selected');
            if(selectedEl) window.inlineRename(window.selectedFile, selectedEl);
        };

        window.deleteSelectedItem = async function() {
            if(!window.selectedFile) return alert("삭제할 항목을 선택하세요.");
            if(confirm(`'${window.selectedFile.title}' 항목을 삭제하시겠습니까?`)) {
                if(window.selectedFile.docId && !window.selectedFile.docId.startsWith('doc-')) {
                    try { await window.deleteDoc(window.doc(window.db, "files", window.selectedFile.docId)); } catch(e) {}
                }
                let folderArr = window.config.folders[window.currentActiveFolder];
                window.config.folders[window.currentActiveFolder] = folderArr.filter(f => f !== window.selectedFile);
                window.selectedFile = null;
                window.renderFiles(window.currentActiveFolder);
            }
        };

        // --- 탐색기 네비게이션 ---
        window.openExplorer = function(folderId, title) {
            document.getElementById('clickSound').play().catch(()=>{});
            window.currentActiveFolder = folderId; window.folderHistory = [{id: folderId, title: title}];
            window.updateAddressBar(); window.renderFiles(folderId); document.getElementById('xpExplorer').style.display = 'flex';
        };

        window.openSubFolder = function(folderId, title) {
            document.getElementById('clickSound').play().catch(()=>{});
            const newPathTitle = window.folderHistory[window.folderHistory.length-1].title + " \\ " + title;
            window.folderHistory.push({id: folderId, title: newPathTitle});
            window.currentActiveFolder = folderId; window.updateAddressBar(); window.renderFiles(folderId);
        };

        window.goBack = function() {
            if (window.folderHistory.length > 1) {
                window.folderHistory.pop();
                window.currentActiveFolder = window.folderHistory[window.folderHistory.length - 1].id;
                window.updateAddressBar(); window.renderFiles(window.currentActiveFolder);
            }
        };

        window.updateAddressBar = function() {
            const current = window.folderHistory[window.folderHistory.length - 1];
            document.getElementById('explorerTitle').innerText = current.title.split(' \\ ').pop();
            document.getElementById('addressPath').innerText = "C:\\" + current.title.replace('로컬 디스크 (C:) \\ ', '');
        };

        window.renderFiles = function(folderId) {
            const view = document.getElementById('explorerView');
            const files = window.config.folders[folderId] || [];
            view.innerHTML = ''; window.selectedFile = null;

            files.forEach((file) => {
                const icon = document.createElement('div'); icon.className = 'file-icon';
                let img = "https://win98icons.alexmeub.com/icons/png/notepad-0.png";
                if(file.type === 'folder' || folderId === 'folder-photos') img = "https://win98icons.alexmeub.com/icons/png/directory_closed-0.png";
                if(file.type === 'rp') img = "https://win98icons.alexmeub.com/icons/png/write_wordpad-0.png";
                if(file.type === 'img') img = "https://win98icons.alexmeub.com/icons/png/image_file-0.png";

                icon.innerHTML = `<img src="${img}"><span class="file-name">${file.title}</span>`;
                
                icon.onclick = (e) => {
                    e.stopPropagation(); document.querySelectorAll('.file-icon').forEach(el => el.classList.remove('selected'));
                    icon.classList.add('selected'); window.selectedFile = file;
                };

                icon.ondblclick = () => { file.type === 'folder' ? window.openSubFolder(file.id, file.title) : window.viewDetail(file); };
                view.appendChild(icon);
            });
        };

        window.clearSelection = function(e) {
            if(e.target.id === 'explorerView') { document.querySelectorAll('.file-icon').forEach(el => el.classList.remove('selected')); window.selectedFile = null; }
        };

        window.closeExplorer = function() { document.getElementById('xpExplorer').style.display = 'none'; };

        // --- 🌟 파일 디테일 뷰어 (메모장 편집 및 이미지 업로드 창) ---
        window.viewDetail = function(file) {
            document.getElementById('clickSound').play().catch(()=>{});
            let contentHTML = '';
            let iconSrc = 'https://win98icons.alexmeub.com/icons/png/notepad-0.png';
            const popupId = 'window-' + Date.now();

            if(file.type === 'txt') {
                contentHTML = `
                    <div style="display:flex; flex-direction:column; height:100%; background:white;">
                        <div class="xp-menubar" style="background:#ece9d8; border-bottom:1px solid #ccc; padding:2px 5px;">
                            <span style="cursor:pointer; padding:2px 5px;" onclick="window.saveTextFile('${file.docId}', '${popupId}')">파일(F) - <b>저장</b></span>
                        </div>
                        <textarea id="txt-${popupId}" style="flex:1; padding:15px; border:none; outline:none; font-family:'Gulim'; font-size:13px; resize:none;">${file.content || ''}</textarea>
                    </div>`;
            } else if(file.type === 'img') {
                iconSrc = 'https://win98icons.alexmeub.com/icons/png/image_file-0.png';
                if(!file.url) {
                    contentHTML = `
                        <div id="img-body-${popupId}" style="padding:20px; background:#ece9d8; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; color:black;">
                            <img src="https://win98icons.alexmeub.com/icons/png/image_file-0.png" style="width:48px; margin-bottom:10px;">
                            <p style="font-size:12px; margin-bottom:10px;">이 이미지 파일은 비어있습니다.<br>업로드할 이미지의 URL을 입력하세요.</p>
                            <input type="text" id="url-${popupId}" style="width:80%; padding:3px; margin-bottom:15px;" placeholder="https://...">
                            <button class="xp-btn" onclick="window.saveImgUrl('${file.docId}', '${popupId}')">확인(업로드)</button>
                        </div>`;
                } else {
                    contentHTML = `<div style="padding:10px; background:#333; height:100%; display:flex; justify-content:center; align-items:center; overflow:auto;"><img src="${file.url}" style="max-width:100%; border:2px inset #fff;"></div>`;
                }
            } else if(file.type === 'rp') {
                contentHTML = `<div style="padding:15px; background:white; color:black; height:100%; overflow-y:auto; font-size:12px;">(기록 로그 표시 영역)</div>`;
            }

            const popup = document.createElement('div');
            popup.className = 'xp-window draggable';
            popup.id = popupId;
            popup.style.cssText = `top: ${Math.random()*50 + 150}px; left: ${Math.random()*50 + 250}px; width: 450px; height: 400px; position: absolute; z-index: 1000;`;

            popup.innerHTML = `
                <div class="xp-title-bar drag-handle">
                    <div style="display:flex; align-items:center; gap:8px;"><img src="${iconSrc}" style="width:16px;"><span>${file.title}</span></div>
                    <div class="xp-close-btn" onclick="document.getElementById('${popupId}').remove()">✕</div>
                </div>
                <div style="flex:1; background:#ece9d8; border:3px solid #0054e3; border-top:none; display:flex; flex-direction:column;">${contentHTML}</div>
            `;
            document.body.appendChild(popup);
        };

        // 메모장 저장 로직
        window.saveTextFile = async function(docId, popupId) {
            const textarea = document.getElementById(`txt-${popupId}`);
            if(!textarea) return;
            const newContent = textarea.value;
            const f = window.findFileByDocId(docId);
            if(f) f.content = newContent;
            
            if(docId && !docId.startsWith('doc-')) {
                try {
                    await window.updateDoc(window.doc(window.db, "files", docId), { content: newContent });
                    alert("저장되었습니다!");
                } catch(e) { alert("저장 실패!"); }
            } else { alert("저장되었습니다! (임시 파일)"); }
        };

        // 이미지 URL 저장 로직
        window.saveImgUrl = async function(docId, popupId) {
            const input = document.getElementById(`url-${popupId}`);
            const val = input.value.trim();
            if(!val) return;
            
            const f = window.findFileByDocId(docId);
            if(f) f.url = val;
            
            if(docId && !docId.startsWith('doc-')) {
                try { await window.updateDoc(window.doc(window.db, "files", docId), { url: val }); } catch(e) { alert("저장 오류!"); return; }
            }
            // 창 내용 이미지 뷰어로 즉시 교체
            const body = document.getElementById(`img-body-${popupId}`);
            if(body) {
                body.parentElement.innerHTML = `<div style="padding:10px; background:#333; height:100%; display:flex; justify-content:center; align-items:center; overflow:auto;"><img src="${val}" style="max-width:100%; border:2px inset #fff;"></div>`;
            }
        };

        window.initDraggable = function() {
            let activeEl = null, initX, initY, curX, curY;
            document.addEventListener("mousedown", (e) => {
                if (e.target.closest(".drag-handle")) {
                    activeEl = e.target.closest(".draggable");
                    initX = e.clientX - (activeEl.dataset.x || 0); initY = e.clientY - (activeEl.dataset.y || 0);
                    activeEl.style.zIndex = 1000;
                }
            });
            document.addEventListener("mousemove", (e) => {
                if (activeEl) { e.preventDefault(); curX = e.clientX - initX; curY = e.clientY - initY;
                    activeEl.dataset.x = curX; activeEl.dataset.y = curY; activeEl.style.transform = `translate3d(${curX}px, ${curY}px, 0)`; }
            });
            document.addEventListener("mouseup", () => { if(activeEl){ activeEl.style.zIndex = 100; activeEl = null; } });
        };
    </script>
</body>
</html>
