<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIKAN-UIN ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');

        :root {
            --bg-color: #080808;
            --kakao-yellow: #fae100;
            --kakao-dark: #2a2a2a;
            --xp-blue: linear-gradient(to bottom, #0058e4 0%, #3b8df5 10%, #0058e4 100%);
            --wmp-bg: #d4d0c8;
            --wmp-border: #808080;
        }

        /* XP 마우스 커서 적용 */
        body, html, a, button, input, textarea, select, .drag-handle {
            cursor: url('https://win98icons.alexmeub.com/icons/cur/aero_arrow.cur'), auto !important;
        }
        .cursor-pointer, .file-icon, .icon-item, .wmp-btn, .xp-close-btn, .xp-btn, .clickable {
             cursor: url('https://win98icons.alexmeub.com/icons/cur/aero_link.cur'), pointer !important;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: #eee;
            font-family: 'Tahoma', 'Noto Sans KR', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* 화면 효과 */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.08; pointer-events: none; z-index: 9999;
        }
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.6) 100%);
            pointer-events: none; z-index: 9998;
        }

        /* 배경 이미지 */
        .bg-container { position: fixed; top: 0; right: 0; width: 75%; height: 100%; z-index: 1; }
        .bg-image { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.85); }
        .fade-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, #080808 0%, #080808 20%, transparent 80%);
            z-index: 2;
        }

        /* 대각선 카톡 루프 */
        .chat-stream {
            position: fixed; top: -45%; left: -5%; width: 55%; height: 200%;
            transform: rotate(25deg); z-index: 3; overflow: hidden; pointer-events: none;
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }
        .chat-track {
            display: flex; flex-direction: column; gap: 50px; padding: 150px;
            animation: scrollUp 180s linear infinite;
        }
        @keyframes scrollUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }
        .chat-item { display: flex; width: 100%; align-items: flex-start; }
        .chat-item.left { justify-content: flex-start; }
        .chat-item.right { justify-content: flex-end; }
        .date-line { width: 100%; text-align: center; font-size: 0.7rem; color: #444; border-bottom: 1px solid #1a1a1a; line-height: 0.1em; margin: 30px 0; }
        .date-line span { background: #080808; padding: 0 15px; }
        .profile-box { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .profile-img { width: 45px; height: 45px; border-radius: 18px; background: #111; overflow: hidden; border: 1px solid #333; }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-size: 0.7rem; color: #666; }
        .bubble-container { max-width: 65%; margin: 0 12px; }
        .kakao-bubble { padding: 10px 14px; border-radius: 14px; font-size: 0.95rem; line-height: 1.4; box-shadow: 2px 2px 8px rgba(0,0,0,0.4); }
        .left .kakao-bubble { background: var(--kakao-dark); color: #ccc; border-top-left-radius: 2px; }
        .right .kakao-bubble { background: var(--kakao-yellow); color: #111; border-top-right-radius: 2px; }

        /* XP 윈도우 공통 */
        .xp-window {
            position: absolute; background: #ece9d8; border: 3px solid #0054e3;
            border-radius: 8px 8px 0 0; flex-direction: column; z-index: 100;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5); display: none;
        }
        .xp-title-bar {
            background: var(--xp-blue); height: 30px; display: flex; align-items: center;
            justify-content: space-between; padding: 0 10px; color: white; font-weight: bold; font-size: 0.85rem;
        }
        .xp-close-btn {
            width: 21px; height: 21px; background: #e91e63; border: 1px solid white;
            border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 10px;
        }

        /* 탐색기 */
        #xpExplorer { top: 100px; left: 28%; width: 850px; height: 600px; }
        .xp-body { display: flex; flex: 1; overflow: hidden; background: #fff; }
        .xp-sidebar { width: 200px; background: linear-gradient(to bottom, #748aff 0%, #4a67ed 100%); padding: 12px; border-right: 1px solid #0054e3; }
        .sidebar-box { background: rgba(255, 255, 255, 0.9); border-radius: 4px; padding: 10px; font-size: 0.75rem; color: #2151dc; margin-bottom: 15px; }
        .xp-main-view { flex: 1; padding: 25px; display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); grid-auto-rows: min-content; gap: 20px; overflow-y: auto; }
        .file-icon { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; padding: 10px; }
        .file-icon:hover { background: rgba(49, 106, 197, 0.1); outline: 1px solid #316ac5; }
        .file-icon img { width: 48px; height: 48px; }
        .file-name { font-size: 0.8rem; color: black; line-height: 1.2; }
        .content-viewer { padding: 25px; color: black; height: 100%; background: white; overflow-y: auto; display: flex; flex-direction: column; }
        .notepad-text { font-family: 'Gulim', monospace; white-space: pre-wrap; font-size: 1rem; line-height: 1.6; }
        .image-display img { max-width: 100%; border: 1px solid #aaa; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* 역극 전용 팝업 윈도우 */
        #rpWindow { top: 150px; left: 35%; width: 600px; height: 700px; z-index: 110; }
        .archive-viewer { background: white; height: 100%; display: flex; flex-direction: column; color: black; }
        .viewer-header { background: #f0f0f0; border-bottom: 1px solid #ccc; padding: 10px; }
        .search-bar { width: 100%; padding: 5px 10px; border: 1px solid #ccc; font-size: 0.85rem; }
        .viewer-scroll { flex: 1; overflow-y: auto; padding: 20px; background: #eef2f5; }
        .msg-line { margin-bottom: 15px; max-width: 85%; }
        .msg-line.right { align-self: flex-end; margin-left: auto; text-align: right; }
        .msg-name { font-weight: bold; font-size: 0.75rem; color: #555; margin-bottom: 3px; }
        .msg-text { background: #fff; padding: 8px 12px; border-radius: 10px; box-shadow: 1px 1px 2px rgba(0,0,0,0.1); font-size: 0.9rem; display: inline-block; text-align: left; }
        .msg-line.right .msg-text { background: #fee500; }

        /* XP 경고창 팝업 */
        @keyframes popin { 0% { transform: scale(0); opacity: 0; } 80% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .xp-popup { position: absolute; width: 380px; z-index: 500; display: block; border: 3px solid #0054e3; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); animation: popin 0.3s ease-out; }
        .xp-popup-body { background: #ece9d8; padding: 20px; color: black; font-size: 0.85rem; display: flex; align-items: flex-start; gap: 15px; }
        .xp-popup-footer { background: #ece9d8; padding: 10px; display: flex; justify-content: center; }
        .xp-btn { background: #ece9d8; border: 1px solid #707070; padding: 3px 20px; font-size: 0.8rem; box-shadow: inset 1px 1px #fff; }
        .xp-btn:active { box-shadow: inset 1px 1px #404040; }

        /* WMP 플레이어 */
        .wmp-player {
            position: fixed; bottom: 30px; right: 30px; width: 320px; height: 480px;
            background: var(--wmp-bg); border: 2px solid #808080; box-shadow: inset 1px 1px #fff, inset -1px -1px #404040, 5px 5px 15px rgba(0,0,0,0.7);
            z-index: 1000; display: flex; flex-direction: column; border-radius: 3px;
        }
        .wmp-title { background: linear-gradient(to right, #000080, #1084d0); height: 22px; padding: 0 5px; display: flex; align-items: center; color: white; font-size: 0.75rem; font-weight: bold; gap: 5px; }
        .wmp-screen { flex: 1; background: black; margin: 5px; border: 2px inset #808080; position: relative; overflow: hidden; }
        .album-cover { width: 100%; height: 200px; object-fit: cover; }
        .wmp-info-panel { height: 120px; background: black; color: #00ff00; font-family: 'Gulim', monospace; font-size: 0.7rem; padding: 10px; border-top: 1px solid #444; line-height: 1.6; }

        /* 바탕화면 아이콘 */
        .desktop-icons { position: fixed; bottom: 40px; left: 50px; display: flex; gap: 40px; z-index: 10; }
        .icon-item { display: flex; flex-direction: column; align-items: center; }
        .icon-img { width: 55px; height: 55px; margin-bottom: 8px; filter: drop-shadow(2px 2px 2px black); }
        .icon-label { font-size: 0.85rem; color: white; text-shadow: 2px 2px 4px black; }

        ::-webkit-scrollbar { width: 16px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #d4d0c8; border: 1px solid #fff; box-shadow: inset -1px -1px 1px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="vignette"></div>
    <div class="bg-container"><img src="https://img1.daumcdn.net/thumb/R1280x0/?scode=mtistory2&fname=https%3A%2F%2Fblog.kakaocdn.net%2Fdna%2Fbo0278%2FdJMcafL32e7%2FAAAAAAAAAAAAAAAAAAAAABlHjiaQc4NH3u1mNQVjRHfd-DvmuBcNJd2YohedpmLn%2Fimg.png%3Fcredential%3DyqXZFxpELC7KVnFOS48ylbz2pIh7yKj8%26expires%3D1774969199%26allow_ip%3D%26allow_referer%3D%26signature%3DmsuoDZ%252FDOFMkyKffXpYXOGq0wjg%253D" alt="Background" class="bg-image"><div class="fade-overlay"></div></div>
    <div class="chat-stream"><div class="chat-track" id="chatTrack"></div></div>

    <div class="desktop-icons">
        <div class="icon-item clickable" onclick="openExplorer('folder-text', '기록 아카이브')"><img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png" class="icon-img"><span class="icon-label">기록 폴더</span></div>
        <div class="icon-item clickable" onclick="openExplorer('folder-photos', '사진첩')"><img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png" class="icon-img"><span class="icon-label">사진첩</span></div>
        <div class="icon-item clickable" onclick="openExplorer('trash', '휴지통')"><img src="https://win98icons.alexmeub.com/icons/png/recycle_bin_empty-4.png" class="icon-img"><span class="icon-label">휴지통</span></div>
    </div>

    <div class="wmp-player draggable" id="wmpPlayer">
        <div class="wmp-title drag-handle"><img src="https://win98icons.alexmeub.com/icons/png/mmsys_cp-0.png" style="width:14px;">Windows Media Player</div>
        <div class="wmp-menu">파일(F) 보기(V) 재생(P) 도움말(H)</div>
        <div class="wmp-screen">
            <img src="https://image.bugsm.co.kr/album/images/200/203296/20329614.jpg?version=20250404015924" class="album-cover">
            <div class="wmp-info-panel">쇼: Jikan-Uin Archive<br>클립: Dawg<br>만든 이: Chin Chilla<br>저작권: 2024 Archive</div>
            <iframe id="musicFrame" style="position:absolute; visibility:hidden; pointer-events:none;" src="https://www.youtube.com/embed/XCliKS4XlWc?autoplay=1&mute=0&loop=1&playlist=XCliKS4XlWc" allow="autoplay"></iframe>
        </div>
        <div class="wmp-controls">
            <div style="width:100%; height:8px; background:#808080; border:1px inset #fff;"></div>
            <div class="wmp-buttons" style="display:flex; justify-content:center; gap:8px; margin-top:5px;">
                <div class="wmp-btn clickable"><i class="fas fa-play"></i></div>
                <div class="wmp-btn clickable" onclick="toggleMusic()"><i class="fas fa-pause"></i></div>
                <div class="wmp-btn clickable"><i class="fas fa-stop"></i></div>

    <div id="virusPopups"></div>

    <!-- XP 탐색기 -->
    <div id="xpExplorer" class="xp-window draggable">
        <div class="xp-title-bar drag-handle">
            <div style="display:flex; align-items:center; gap:8px;"><img src="https://win98icons.alexmeub.com/icons/png/directory_closed-0.png" style="width:16px;"><span id="explorerTitle">탐색기</span></div>
            <div class="xp-close-btn clickable" onclick="closeExplorer()">✕</div>
        </div>
        <div class="xp-body">
            <div class="xp-sidebar">
                <div class="sidebar-box"><b>시스템 작업</b><br><span class="cursor-pointer underline clickable" onclick="addNewFolder()">새 폴더 생성</span><br><span class="cursor-pointer underline clickable" onclick="triggerAddFile()">파일 추가</span></div>
                <div class="sidebar-box"><b>기타 위치</b><br>내 문서<br>바탕 화면</div>
            </div>
            <div class="xp-main-view" id="explorerView"></div>
        </div>
    </div>

    <!-- 역극 전용 팝업 뷰어 -->
    <div id="rpWindow" class="xp-window draggable">
        <div class="xp-title-bar drag-handle">
            <div style="display:flex; align-items:center; gap:8px;"><img src="https://win98icons.alexmeub.com/icons/png/write_wordpad-0.png" style="width:16px;"><span id="rpTitle">역극 기록 뷰어</span></div>
            <div class="xp-close-btn clickable" onclick="closeRPWindow()">✕</div>
        </div>
        <div class="xp-body" id="rpBody"></div>
    </div>

    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <!-- Firebase SDK 로드 (모듈 방식) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, getDoc, onSnapshot, updateDoc, arrayUnion, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

       const firebaseConfig = {
  apiKey: "AIzaSyAzy2_YfNKk2vPzU6l1AwjCC1_TepXYAsU",
  authDomain: "inukan-19e53.firebaseapp.com",
  projectId: "inukan-19e53",
  storageBucket: "inukan-19e53.firebasestorage.app",
  messagingSenderId: "1035051352954",
  appId: "1:1035051352954:web:a06a37592846ac41710cc3",
  measurementId: "G-7KQDVWXS8B"
};

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 전역 변수 노출 (모듈 밖에서 사용하기 위함)
        window.db = db;
        window.doc = doc;
        window.updateDoc = updateDoc;
        window.arrayUnion = arrayUnion;

        let profiles = {};
        let currentActiveFolder = '';
        let currentRPData = [];

        // 초기 데이터 로드 및 리스너 등록
        async function initData() {
            // 프로필 로드
            const configSnap = await getDoc(doc(db, 'config', 'main'));
            if (configSnap.exists()) {
                profiles = configSnap.data().profiles;
            }

            // 채팅 스트림 실시간 리스너
            const q = query(collection(db, 'chats'), orderBy('order'));
            onSnapshot(q, (snapshot) => {
                const chats = snapshot.docs.map(doc => doc.data());
                renderChatStream(chats);
            });
        }

        function renderChatStream(chats) {
            const track = document.getElementById('chatTrack');
            track.innerHTML = ''; // 기존 내용 초기화
            const repeatedChats = Array(15).fill(chats).flat();
            repeatedChats.forEach(chat => {
                if (chat.type === 'date') {
                    const dl = document.createElement('div');
                    dl.className = 'date-line';
                    dl.innerHTML = `<span>${chat.text}</span>`;
                    track.appendChild(dl);
                } else {
                    const item = document.createElement('div');
                    item.className = `chat-item ${chat.side}`;
                    const prof = `<div class="profile-box"><div class="profile-img"><img src="${chat.side === 'left' ? profiles.jikan : profiles.jiuin}"></div><span class="profile-name">${chat.sender}</span></div>`;
                    const bub = `<div class="bubble-container"><div class="kakao-bubble">${chat.text}</div></div>`;
                    item.innerHTML = chat.side === 'left' ? prof + bub : bub + prof;
                    track.appendChild(item);
                }
            });
        }

        // 전역 함수로 만들기
        window.initData = initData;

        // --- 이하 기존 로직 (Firebase 연동 수정) ---

        window.openExplorer = function(folderId, title) {
            playSound();
            const win = document.getElementById('xpExplorer');
            document.getElementById('explorerTitle').innerText = title;
            currentActiveFolder = folderId;
            renderFiles(folderId);
            win.style.display = 'flex';
        }

        window.closeExplorer = function() { document.getElementById('xpExplorer').style.display = 'none'; }

        // 폴더 내용 실시간 렌더링
        function renderFiles(folderId) {
            const view = document.getElementById('explorerView');
            view.innerHTML = '<div style="padding:20px;">로딩 중...</div>';

            // 해당 폴더 문서에 대한 실시간 리스너
            onSnapshot(doc(db, 'folders', folderId), (docSnap) => {
                if (docSnap.exists()) {
                    const files = docSnap.data().files || [];
                    view.innerHTML = '';
                    files.forEach((file) => {
                        const icon = document.createElement('div');
                        icon.className = 'file-icon clickable';
                        let img = "https://win98icons.alexmeub.com/icons/png/notepad-0.png";
                        if(file.type === 'folder' || folderId === 'folder-photos') img = "https://win98icons.alexmeub.com/icons/png/directory_closed-0.png";
                        if(file.type === 'rp') img = "https://win98icons.alexmeub.com/icons/png/write_wordpad-0.png";
                        icon.innerHTML = `<img src="${img}"><span class="file-name">${file.title}</span>`;
                        icon.onclick = () => file.type === 'folder' ? openExplorer(file.id, file.title) : viewDetail(file);
                        view.appendChild(icon);
                    });
                } else {
                    view.innerHTML = '<div style="padding:20px;">폴더가 비어있거나 없습니다.</div>';
                }
            });
        }

        window.viewDetail = function(file) {
            const view = document.getElementById('explorerView');
            let content = '';
            
            if(file.type === 'txt') {
                content = `<div class="notepad-text p-5 bg-white text-black h-full overflow-y-auto">${file.content}</div>`;
                 view.innerHTML = `
                    <div class="content-viewer">
                        <div class="flex justify-between items-center px-4 py-2 border-b-2 border-blue-600 bg-gray-100">
                            <b class="text-black text-sm">${file.title}</b>
                            <span class="cursor-pointer font-bold text-blue-600 text-sm clickable" onclick="renderFiles('${currentActiveFolder}')">[뒤로]</span>
                        </div>
                        ${content}
                    </div>`;
            } else if(file.type === 'img') {
                content = `<div class="image-display p-5 h-full overflow-y-auto"><img src="${file.url}"></div>`;
                 view.innerHTML = `
                    <div class="content-viewer">
                        <div class="flex justify-between items-center px-4 py-2 border-b-2 border-blue-600 bg-gray-100">
                            <b class="text-black text-sm">${file.title}</b>
                            <span class="cursor-pointer font-bold text-blue-600 text-sm clickable" onclick="renderFiles('${currentActiveFolder}')">[뒤로]</span>
                        </div>
                        ${content}
                    </div>`;
            } else if(file.type === 'rp') {
                // 역극은 새 창으로 열기
                openRPWindow(file);
            }
        }

        // 역극 전용 새 창 열기
        window.openRPWindow = function(file) {
            playSound();
            const win = document.getElementById('rpWindow');
            const body = document.getElementById('rpBody');
            document.getElementById('rpTitle').innerText = file.title;
            currentRPData = file.content; // 검색을 위해 데이터 저장

            body.innerHTML = `
                <div class="archive-viewer">
                    <div class="viewer-header">
                        <input type="text" class="search-bar" placeholder="기록 검색..." onkeyup="filterRP(this.value)">
                    </div>
                    <div class="viewer-scroll" id="rpScroll">
                        ${renderRPItems(file.content)}
                    </div>
                </div>
            `;
            win.style.display = 'flex';
        }
        window.closeRPWindow = function() { document.getElementById('rpWindow').style.display = 'none'; }

        window.renderRPItems = function(data) {
            return data.map(m => `
                <div class="msg-line ${m.side}">
                    <div class="msg-name">${m.name}</div>
                    <div class="msg-text">${m.msg}</div>
                </div>
            `).join('');
        }

        window.filterRP = function(val) {
            const scroll = document.getElementById('rpScroll');
            const filtered = currentRPData.filter(m => m.msg.includes(val) || m.name.includes(val));
            scroll.innerHTML = renderRPItems(filtered);
        }

        // Firebase에 새 폴더 추가
        window.addNewFolder = async function() {
            const name = prompt("새 폴더 이름:");
            if(name) {
                const id = 'folder-' + Date.now();
                const newFolderData = { type: 'folder', title: name, id: id };
                // 현재 폴더의 files 배열에 새 폴더 정보 추가
                await updateDoc(doc(db, 'folders', currentActiveFolder), {
                    files: arrayUnion(newFolderData)
                });
                // 새 폴더 문서 생성 (빈 파일 배열)
                // (실제로는 setDoc으로 새 문서를 만들어야 하지만, 간단히 files 배열 업데이트로 처리)
            }
        }

        // Firebase에 새 파일 추가
        window.triggerAddFile = async function() {
            const t = prompt("파일명:");
            // 간단한 예시: 사진첩이면 URL, 아니면 텍스트 입력
            const c = prompt(currentActiveFolder === 'folder-photos' ? "이미지 URL:" : "내용 (텍스트):");
            if(t && c) {
                const newData = currentActiveFolder === 'folder-photos' ? {type:'img', title:t, url:c} : {type:'txt', title:t+".txt", content:c};
                await updateDoc(doc(db, 'folders', currentActiveFolder), {
                    files: arrayUnion(newData)
                });
            }
        }

        // 초기 실행 및 기타 함수들
        window.onload = function() {
            initData(); // Firebase 데이터 로드 시작
            spawnVirusPopups();
            initDraggable();
        };

        function playSound() { document.getElementById('clickSound').play().catch(()=>{}); }

        function spawnVirusPopups() {
            const layer = document.getElementById('virusPopups');
            const playerRect = document.getElementById('wmpPlayer').getBoundingClientRect();
            const count = 6 + Math.floor(Math.random() * 3); // 6~8개 팝업

            for(let i=0; i<count; i++) {
                setTimeout(() => {
                    const popup = document.createElement('div');
                    popup.className = 'xp-window xp-popup draggable';
                    // 플레이어 주변 랜덤 위치
                    const left = playerRect.left + (Math.random() * playerRect.width * 1.5) - 200;
                    const top = playerRect.top + (Math.random() * playerRect.height * 1.2) - 150;
                    popup.style.left = `${left}px`;
                    popup.style.top = `${top}px`;
                    popup.style.zIndex = 500 + i;

                    popup.innerHTML = `
                        <div class="xp-title-bar drag-handle" style="background:#d80000;">
                            <span>시스템 치명적 오류</span>
                            <div class="xp-close-btn clickable" onclick="this.parentElement.parentElement.remove()">✕</div>
                        </div>
                        <div class="xp-popup-body">
                            <img src="https://win98icons.alexmeub.com/icons/png/msg_error-0.png" style="width:32px;">
                            <div style="color:#d80000; font-weight:bold;">
                                ⚠️ 0x000000${i} 메모리 참조 오류!<br>
                                데이터가 손상되었습니다. 복구할 수 없습니다.
                            </div>
                        </div>
                        <div class="xp-popup-footer">
                            <button class="xp-btn clickable" onclick="this.parentElement.parentElement.remove()">종료</button>
                        </div>
                    `;
                    layer.appendChild(popup);
                }, i * 250); // 0.25초 간격으로 생성
            }
        }

        function initDraggable() {
            let activeElement = null;
            let currentX, currentY, initialX, initialY;

            document.addEventListener("mousedown", (e) => {
                const handle = e.target.closest(".drag-handle");
                if (handle) {
                    activeElement = handle.closest(".draggable");
                    initialX = e.clientX - activeElement.offsetLeft;
                    initialY = e.clientY - activeElement.offsetTop;
                    // 클릭한 윈도우를 최상위로 올림
                    document.querySelectorAll('.draggable').forEach(el => el.style.zIndex = el.classList.contains('xp-popup') ? 500 : 100);
                    activeElement.style.zIndex = 600;
                }
            });
            document.addEventListener("mousemove", (e) => {
                if (activeElement) {
                    e.preventDefault();
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                    activeElement.style.left = `${currentX}px`;
                    activeElement.style.top = `${currentY}px`;
                }
            });
            document.addEventListener("mouseup", () => activeElement = null);
        }

        window.toggleMusic = function() {
            const frame = document.getElementById('musicFrame');
            const src = frame.src;
            frame.src = src.includes('autoplay=1') ? src.replace('autoplay=1', 'autoplay=0') : src.replace('autoplay=0', 'autoplay=1');
        }
    </script>
</body>
</html>
