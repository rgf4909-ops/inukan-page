<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIKAN-UIN ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');

        :root {
            --bg-color: #080808;
            --kakao-yellow: #fae100;
            --kakao-dark: #2a2a2a;
            --xp-blue: linear-gradient(to bottom, #0058e4 0%, #3b8df5 10%, #0058e4 100%);
            --wmp-bg: #d4d0c8;
            --wmp-border: #808080;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: #eee;
            font-family: 'Tahoma', 'Noto Sans KR', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* 화면 효과 */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.08; pointer-events: none; z-index: 9999;
        }
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.6) 100%);
            pointer-events: none; z-index: 9998;
        }

        /* 배경 이미지 */
        .bg-container {
            position: fixed; top: 0; right: 0;
            width: 75%; height: 100%;
            z-index: 1;
        }
        .bg-image { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.85); }
        .fade-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, #080808 0%, #080808 20%, transparent 80%);
            z-index: 2;
        }

        /* 카톡 루프 */
        .chat-stream {
            position: fixed; top: -45%; left: -5%;
            width: 55%; height: 200%;
            transform: rotate(25deg);
            z-index: 3; overflow: hidden; pointer-events: none;
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }
        .chat-track {
            display: flex; flex-direction: column; gap: 50px;
            padding: 150px;
            animation: scrollUp 180s linear infinite;
        }
        @keyframes scrollUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        .chat-item { display: flex; width: 100%; align-items: flex-start; }
        .chat-item.left { justify-content: flex-start; }
        .chat-item.right { justify-content: flex-end; }
        
        .profile-box { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .profile-img { width: 45px; height: 45px; border-radius: 18px; background: #111; overflow: hidden; border: 1px solid #333; }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-size: 0.7rem; color: #666; }

        .bubble-container { max-width: 65%; margin: 0 12px; }
        .kakao-bubble { padding: 10px 14px; border-radius: 14px; font-size: 0.95rem; line-height: 1.4; box-shadow: 2px 2px 8px rgba(0,0,0,0.4); }
        .left .kakao-bubble { background: var(--kakao-dark); color: #ccc; border-top-left-radius: 2px; }
        .right .kakao-bubble { background: var(--kakao-yellow); color: #111; border-top-right-radius: 2px; }

        /* XP 윈도우 공통 디자인 */
        .xp-window {
            position: absolute; background: #ece9d8; border: 3px solid #0054e3;
            border-radius: 8px 8px 0 0; flex-direction: column; z-index: 100;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }
        .xp-title-bar {
            background: var(--xp-blue); height: 30px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px; color: white; font-weight: bold; font-size: 0.85rem; cursor: move;
        }
        .xp-close-btn {
            width: 21px; height: 21px; background: #e91e63; border: 1px solid white;
            border-radius: 2px; display: flex; align-items: center; justify-content: center;
            font-size: 10px; cursor: pointer;
        }

        /* 탐색기 스타일 */
        #xpExplorer { top: 100px; left: 28%; width: 850px; height: 600px; display: none; }
        .xp-body { display: flex; flex: 1; overflow: hidden; background: #fff; }
        .xp-sidebar { width: 200px; background: linear-gradient(to bottom, #748aff 0%, #4a67ed 100%); padding: 12px; border-right: 1px solid #0054e3; }
        .sidebar-box { background: rgba(255, 255, 255, 0.9); border-radius: 4px; padding: 10px; font-size: 0.75rem; color: #2151dc; margin-bottom: 15px; }
        .xp-main-view { flex: 1; padding: 25px; display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); grid-auto-rows: min-content; gap: 20px; overflow-y: auto; }
        
        /* 고전 아이콘 */
        .file-icon { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; cursor: pointer; padding: 10px; }
        .file-icon:hover { background: rgba(49, 106, 197, 0.1); outline: 1px solid #316ac5; }
        .file-icon img { width: 48px; height: 48px; }
        .file-name { font-size: 0.8rem; color: black; line-height: 1.2; }

        /* XP 경고창 팝업 스타일 */
        .xp-popup { position: absolute; width: 380px; z-index: 500; display: block; border: 3px solid #0054e3; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        .xp-popup-body { background: #ece9d8; padding: 20px; color: black; font-size: 0.85rem; display: flex; align-items: flex-start; gap: 15px; }
        .xp-popup-footer { background: #ece9d8; padding: 10px; display: flex; justify-content: center; }
        .xp-btn { background: #ece9d8; border: 1px solid #707070; padding: 3px 20px; font-size: 0.8rem; box-shadow: inset 1px 1px #fff; cursor: pointer; }
        .xp-btn:active { box-shadow: inset 1px 1px #404040; }

        /* WMP 플레이어 */
        .wmp-player {
            position: fixed; bottom: 30px; right: 30px;
            width: 320px; height: 480px;
            background: var(--wmp-bg); border: 2px solid #808080;
            box-shadow: inset 1px 1px #fff, inset -1px -1px #404040, 5px 5px 15px rgba(0,0,0,0.7);
            z-index: 1000; display: flex; flex-direction: column; border-radius: 3px;
        }
        .wmp-title { background: linear-gradient(to right, #000080, #1084d0); height: 22px; padding: 0 5px; display: flex; align-items: center; color: white; font-size: 0.75rem; font-weight: bold; gap: 5px; }
        .wmp-screen { flex: 1; background: black; margin: 5px; border: 2px inset #808080; position: relative; overflow: hidden; }
        .album-cover { width: 100%; height: 200px; object-fit: cover; }
        .wmp-info-panel { height: 120px; background: black; color: #00ff00; font-family: 'Gulim', monospace; font-size: 0.7rem; padding: 10px; border-top: 1px solid #444; line-height: 1.6; }

        /* 아카이브 뷰어 (역극 전용) */
        .archive-viewer { background: white; height: 100%; display: flex; flex-direction: column; color: black; }
        .viewer-header { background: #f0f0f0; border-bottom: 1px solid #ccc; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .search-bar { width: 100%; padding: 5px 10px; border: 1px solid #ccc; font-size: 0.85rem; margin-top: 5px; }
        .viewer-scroll { flex: 1; overflow-y: auto; padding: 20px; background: #eef2f5; }
        .msg-line { margin-bottom: 15px; max-width: 85%; }
        .msg-line.right { align-self: flex-end; margin-left: auto; text-align: right; }
        .msg-name { font-weight: bold; font-size: 0.75rem; color: #555; margin-bottom: 3px; }
        .msg-text { background: #fff; padding: 8px 12px; border-radius: 10px; box-shadow: 1px 1px 2px rgba(0,0,0,0.1); font-size: 0.9rem; display: inline-block; text-align: left; }
        .msg-line.right .msg-text { background: #fee500; }

        /* 하단 아이콘 */
        .desktop-icons { position: fixed; bottom: 40px; left: 50px; display: flex; gap: 40px; z-index: 10; }
        .icon-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .icon-img { width: 55px; height: 55px; margin-bottom: 8px; filter: drop-shadow(2px 2px 2px black); }
        .icon-label { font-size: 0.85rem; color: white; text-shadow: 2px 2px 4px black; }

        ::-webkit-scrollbar { width: 16px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #d4d0c8; border: 1px solid #fff; box-shadow: inset -1px -1px 1px rgba(0,0,0,0.2); }
    </style>
</head>
<body onload="window.init()">

    <div class="vignette"></div>

    <div class="bg-container">
        <img src="https://img1.daumcdn.net/thumb/R1280x0/?scode=mtistory2&fname=https%3A%2F%2Fblog.kakaocdn.net%2Fdna%2Fbo0278%2FdJMcafL32e7%2FAAAAAAAAAAAAAAAAAAAAABlHjiaQc4NH3u1mNQVjRHfd-DvmuBcNJd2YohedpmLn%2Fimg.png%3Fcredential%3DyqXZFxpELC7KVnFOS48ylbz2pIh7yKj8%26expires%3D1774969199%26allow_ip%3D%26allow_referer%3D%26signature%3DmsuoDZ%252FDOFMkyKffXpYXOGq0wjg%253D" alt="Background" class="bg-image">
        <div class="fade-overlay"></div>
    </div>

    <div class="chat-stream">
        <div class="chat-track" id="chatTrack"></div>
    </div>

    <div class="desktop-icons">
        <div class="icon-item" onclick="window.openExplorer('folder-text', '기록 아카이브')">
            <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png" class="icon-img">
            <span class="icon-label">기록 폴더</span>
        </div>
        <div class="icon-item" onclick="window.openExplorer('folder-photos', '사진첩')">

            <span class="icon-label">사진첩</span>
        </div>
        <div class="icon-item" onclick="window.openExplorer('trash', '휴지통')">
            <img src="https://win98icons.alexmeub.com/icons/png/recycle_bin_empty-4.png" class="icon-img">
            <span class="icon-label">휴지통</span>
        </div>
    </div>

    <div class="wmp-player draggable" id="wmpPlayer">
        <div class="wmp-title drag-handle">
            <img src="https://win98icons.alexmeub.com/icons/png/mmsys_cp-0.png" style="width:14px;">
            Windows Media Player
        </div>
        <div class="wmp-menu">파일(F) 보기(V) 재생(P) 도움말(H)</div>
        <div class="wmp-screen">
            <img src="https://image.bugsm.co.kr/album/images/200/203296/20329614.jpg?version=20250404015924" class="album-cover">
            <div class="wmp-info-panel">
                쇼: Jikan-Uin Archive<br>
                클립: Dawg<br>
                만든 이: Chin Chilla<br>
                저작권: 2024 Archive
            </div>
            <iframe id="musicFrame" style="position:absolute; visibility:hidden; pointer-events:none;" src="https://www.youtube.com/embed/XCliKS4XlWc?autoplay=1&mute=0&loop=1&playlist=XCliKS4XlWc" allow="autoplay"></iframe>
        </div>
        <div class="wmp-controls">
            <div style="width:100%; height:8px; background:#808080; border:1px inset #fff;"></div>
            <div class="wmp-buttons">
                <div class="wmp-btn"><i class="fas fa-play"></i></div>
                <div class="wmp-btn" onclick="window.toggleMusic()"><i class="fas fa-pause"></i></div>
                <div class="wmp-btn"><i class="fas fa-stop"></i></div>
                <div style="width:1px; background:#808080; height:15px; margin:0 5px;"></div>
                <div class="wmp-btn"><i class="fas fa-volume-up"></i></div>
            </div>
        </div>
    </div>

    <div id="virusPopups"></div>

    <div id="xpExplorer" class="xp-window draggable">
        <div class="xp-title-bar drag-handle">
            <div style="display:flex; align-items:center; gap:8px;">
                <img src="https://win98icons.alexmeub.com/icons/png/directory_closed-0.png" style="width:16px;">
                <span id="explorerTitle">탐색기</span>
            </div>
            <div class="xp-close-btn" onclick="window.closeExplorer()">✕</div>
        </div>
        <div class="xp-body">
            <div class="xp-sidebar">
                <div class="sidebar-box">
                    <b>시스템 작업</b><br>
                    <span class="cursor-pointer underline font-bold" id="backBtn" onclick="window.goBack()" style="display:none; color: #e91e63;">⬅️ 상위 폴더로</span><br>
                    <span class="cursor-pointer underline" onclick="window.addNewFolder()">새 폴더 생성</span><br>
                    <span class="cursor-pointer underline" onclick="window.triggerAddFile()">파일 추가</span>
                </div>
                <div class="sidebar-box"><b>기타 위치</b><br>내 문서<br>바탕 화면</div>
            </div>
            <div class="xp-main-view" id="explorerView"></div>
        </div>
    </div>

    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // 사용자님의 파이어베이스 설정
        const firebaseConfig = {
            apiKey: "AIzaSyAzy2_YfNKk2vPzU6l1AwjCC1_TepXYAsU",
            authDomain: "inukan-19e53.firebaseapp.com",
            projectId: "inukan-19e53",
            storageBucket: "inukan-19e53.firebasestorage.app",
            messagingSenderId: "1035051352954",
            appId: "1:1035051352954:web:a06a37592846ac41710cc3",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.addDoc = addDoc;
        window.getDocs = getDocs;
        window.collection = collection;

        // 환경 설정 데이터
        window.config = {
            profiles: {
                jikan: "https://i.postimg.cc/wjYnMhTH/jikanpeusa.png",
                jiuin: "https://i.postimg.cc/QVGYB3D4/peusa.png"
            },
            chats: [
                { type: 'date', text: "2024년 11월 17일" },
                { sender: "지칸", text: "씨발. 진짜.. 너 어디냐.", side: "left" },
                { sender: "지우인", text: "나 웃는 게 그렇게 싫어? 끓여준 게 어디야.", side: "right" },
                { sender: "지칸", text: "여유 부리면서 쳐웃지 마라. 꼴받으니까.", side: "left" },
                { sender: "지우인", text: "라면이 사고냐? 먹을 수 있으면 된 거 아냐?", side: "right" },
                { type: 'date', text: "2024년 11월 18일" },
                { sender: "지우인", text: "섹스해주잖아. 영광인 줄 알고 그냥 자.", side: "right" },
                { sender: "지칸", text: "...고마워해야 하는 거냐? 하.", side: "left" },
                { sender: "지우인", text: "나 돈 없어. 눌러앉을 거면 네가 밥 해.", side: "right" },
                { sender: "지칸", text: "시발. 잠 깨워봐 그럼.", side: "left" }
            ],
            folders: {
                'folder-text': [
                    { 
                        type: 'rp', 
                        title: "역극_3000개_백업.log", 
                        content: [
                            { name: "지우인", msg: "야, 거기 서.", side: "right" },
                            { name: "지칸", msg: "서면 뭐 해줄 건데? 씨발..", side: "left" },
                            { name: "지우인", msg: "밥 사줄게. 화 좀 풀어.", side: "right" },
                            { name: "지칸", msg: "난 네가 차려주는 거 아니면 안 먹어.", side: "left" },
                            { name: "지우인", msg: "내가 하면 다 타잖아. 알면서 그래?", side: "right" },
                            { name: "지칸", msg: "타도 먹을 테니까 해보라고.", side: "left" },
                            { name: "지우인", msg: "고집 진짜...", side: "right" },
                            { name: "지우인", msg: "이따가 집으로 갈게.", side: "right" },
                            { name: "지칸", msg: "오든지 말든지.", side: "left" }
                        ]
                    },
                    { type: 'txt', title: "기록_파편.txt", content: "모든 게 무너진 날의 기록.\n지칸은 더 이상 웃지 않았다." }
                ],
                'folder-photos': [
                    { type: 'img', title: "메모리_01.jpg", url: "https://images.unsplash.com/photo-1518562180175-34a163b1a9a6" }
                ],
                'trash': [
                    { type: 'txt', title: "버려진_쪽지.txt", content: "재워주게?" }
                ]
            }
        };

        window.currentActiveFolder = '';
        window.folderHistory = [];
        window.currentRPData = [];

        window.init = async function() {
            window.initChatLoop();
            window.spawnVirusPopups();
            window.initDraggable();
            
            try {
                await window.loadFilesFromFirebase();
            } catch(e) {
                console.error("Firebase 로딩 실패: ", e);
            }
        };

        window.initChatLoop = function() {
            const track = document.getElementById('chatTrack');
            const repeatedChats = Array(15).fill(window.config.chats).flat();
            repeatedChats.forEach(chat => {
                if (chat.type === 'date') {
                    const dl = document.createElement('div');
                    dl.className = 'date-line';
                    dl.innerHTML = `<span>${chat.text}</span>`;
                    track.appendChild(dl);
                } else {
                    const item = document.createElement('div');
                    item.className = `chat-item ${chat.side}`;
                    const prof = `<div class="profile-box"><div class="profile-img"><img src="${chat.side === 'left' ? window.config.profiles.jikan : window.config.profiles.jiuin}"></div><span class="profile-name">${chat.sender}</span></div>`;
                    const bub = `<div class="bubble-container"><div class="kakao-bubble">${chat.text}</div></div>`;
                    item.innerHTML = chat.side === 'left' ? prof + bub : bub + prof;
                    track.appendChild(item);
                }
            });
        };

        window.spawnVirusPopups = function() {
            const layer = document.getElementById('virusPopups');
            const playerRect = document.getElementById('wmpPlayer').getBoundingClientRect();
            for(let i=0; i<2; i++) {
                const popup = document.createElement('div');
                popup.className = 'xp-window xp-popup draggable';
                popup.style.left = (playerRect.left - 100 + (i * 60)) + 'px';
                popup.style.top = (playerRect.top - 150 + (i * 40)) + 'px';
                popup.innerHTML = `
                    <div class="xp-title-bar drag-handle">
                        <span>시스템 경고!</span>
                        <div class="xp-close-btn" onclick="this.parentElement.parentElement.remove()">✕</div>
                    </div>
                    <div class="xp-popup-body">
                        <img src="https://win98icons.alexmeub.com/icons/png/msg_warning-0.png" style="width:32px;">
                        <div><b>컴퓨터가 감염되었습니다!</b><br>가능한 위협을 지금 제거하십시오.</div>
                    </div>
                    <div class="xp-popup-footer">
                        <button class="xp-btn" onclick="this.parentElement.parentElement.remove()">확인</button>
                    </div>
                `;
                layer.appendChild(popup);
            }
        };

        window.initDraggable = function() {
            let activeElement = null;
            let currentX, currentY, initialX, initialY;

            document.addEventListener("mousedown", (e) => {
                const handle = e.target.closest(".drag-handle");
                if (handle) {
                    activeElement = handle.closest(".draggable");
                    initialX = e.clientX - (activeElement.dataset.x || 0);
                    initialY = e.clientY - (activeElement.dataset.y || 0);
                    activeElement.style.zIndex = 1000;
                }
            });

            document.addEventListener("mousemove", (e) => {
                if (activeElement) {
                    e.preventDefault();
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                    activeElement.dataset.x = currentX;
                    activeElement.dataset.y = currentY;
                    activeElement.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
                }
            });

            document.addEventListener("mouseup", () => {
                if (activeElement) {
                    activeElement.style.zIndex = 100;
                    activeElement = null;
                }
            });
        };

        window.toggleMusic = function() {
            const frame = document.getElementById('musicFrame');
            const src = frame.src;
            frame.src = src.includes('autoplay=1') ? src.replace('autoplay=1', 'autoplay=0') : src.replace('autoplay=0', 'autoplay=1');
        };

        window.closeExplorer = function() { document.getElementById('xpExplorer').style.display = 'none'; };

        window.openExplorer = function(folderId, title) {
            document.getElementById('clickSound').play().catch(()=>{});
            const win = document.getElementById('xpExplorer');
            document.getElementById('explorerTitle').innerText = title;
            
            window.currentActiveFolder = folderId;
            window.folderHistory = [folderId];
            window.updateBackButton();
            
            window.renderFiles(folderId);
            win.style.display = 'flex';
        };

        window.openSubFolder = function(folderId, title) {
            document.getElementById('clickSound').play().catch(()=>{});
            window.folderHistory.push(folderId);
            window.currentActiveFolder = folderId;
            document.getElementById('explorerTitle').innerText = title;
            
            window.updateBackButton();
            window.renderFiles(folderId);
        };

        window.goBack = function() {
            if (window.folderHistory.length > 1) {
                window.folderHistory.pop();
                window.currentActiveFolder = window.folderHistory[window.folderHistory.length - 1];
                window.updateBackButton();
                window.renderFiles(window.currentActiveFolder);
            }
        };

        window.updateBackButton = function() {
            const btn = document.getElementById('backBtn');
            if(btn) btn.style.display = window.folderHistory.length > 1 ? 'block' : 'none';
        };

        window.renderFiles = function(folderId) {
            const view = document.getElementById('explorerView');
            const files = window.config.folders[folderId] || [];
            view.innerHTML = '';

            files.forEach((file) => {
                const icon = document.createElement('div');
                icon.className = 'file-icon';
                
                let img = "https://win98icons.alexmeub.com/icons/png/notepad-0.png";
                if(file.type === 'folder' || folderId === 'folder-photos') img = "https://win98icons.alexmeub.com/icons/png/directory_closed-0.png";
                if(file.type === 'rp') img = "https://win98icons.alexmeub.com/icons/png/write_wordpad-0.png";
                if(file.type === 'img') img = "https://win98icons.alexmeub.com/icons/png/image_file-0.png";

                icon.innerHTML = `<img src="${img}"><span class="file-name">${file.title}</span>`;
                icon.onclick = () => file.type === 'folder' ? window.openSubFolder(file.id, file.title) : window.viewDetail(file);
                view.appendChild(icon);
            });
        };

        window.viewDetail = function(file) {
            document.getElementById('clickSound').play().catch(()=>{});

            let contentHTML = '';
            let iconSrc = 'https://win98icons.alexmeub.com/icons/png/notepad-0.png';

            if(file.type === 'txt') {
                contentHTML = `<div style="padding: 15px; background: white; color: black; height: 100%; box-sizing: border-box; font-family: 'Gulim', sans-serif; font-size: 14px; white-space: pre-wrap; overflow-y: auto;">${file.content}</div>`;
            } else if(file.type === 'img') {
                contentHTML = `<div style="padding: 10px; background: #333; height: 100%; display: flex; justify-content: center; align-items: center; overflow: auto;"><img src="${file.url}" style="max-width: 100%; max-height: 100%; border: 2px inset #fff;"></div>`;
                iconSrc = 'https://win98icons.alexmeub.com/icons/png/image_file-0.png';
            } else if(file.type === 'rp') {
                window.currentRPData = file.content;
                contentHTML = `
                    <div class="archive-viewer">
                        <div class="viewer-header">
                            <input type="text" class="search-bar" placeholder="기록 검색..." onkeyup="window.filterRP(this.value)">
                        </div>
                        <div class="viewer-scroll" id="rpScroll">
                            ${window.renderRPItems(file.content)}
                        </div>
                    </div>`;
            }

            const popupId = 'window-' + Date.now();
            const popup = document.createElement('div');
            popup.className = 'xp-window draggable';
            popup.id = popupId;
            
            const offset = Math.floor(Math.random() * 50) + 150;
            popup.style.cssText = `top: ${offset}px; left: ${offset + 200}px; width: 450px; height: 400px; display: flex; flex-direction: column; z-index: 1000; position: absolute;`;

            popup.innerHTML = `
                <div class="xp-title-bar drag-handle">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <img src="${iconSrc}" style="width:16px;">
                        <span>${file.title}</span>
                    </div>
                    <div class="xp-close-btn" onclick="document.getElementById('${popupId}').remove()">✕</div>
                </div>
                <div style="flex: 1; overflow-y: auto; background: #ece9d8; padding: 2px; border-bottom: 3px solid #0054e3; border-left: 3px solid #0054e3; border-right: 3px solid #0054e3;">
                    ${contentHTML}
                </div>
            `;
            document.body.appendChild(popup);
        };

        window.renderRPItems = function(data) {
            return data.map(m => `
                <div class="msg-line ${m.side}">
                    <div class="msg-name">${m.name}</div>
                    <div class="msg-text">${m.msg}</div>
                </div>
            `).join('');
        };

        window.filterRP = function(val) {
            const scroll = document.getElementById('rpScroll');
            const filtered = window.currentRPData.filter(m => m.msg.includes(val) || m.name.includes(val));
            scroll.innerHTML = window.renderRPItems(filtered);
        };

        window.addNewFolder = async function() {
            const name = prompt("새 폴더 이름:");
            if(!name) return;

            const id = 'folder-' + Date.now();
            const newFolder = { type: 'folder', title: name, id: id, folder: window.currentActiveFolder };

            try {
                await window.addDoc(window.collection(window.db, "files"), { ...newFolder, createdAt: Date.now() });
            } catch(e) {
                console.error("폴더 저장 오류:", e);
                alert("데이터베이스 저장에 실패했습니다. 임시로 생성됩니다.");
            }

            if(!window.config.folders[id]) window.config.folders[id] = [];
            if(!window.config.folders[window.currentActiveFolder]) window.config.folders[window.currentActiveFolder] = [];
            
            window.config.folders[window.currentActiveFolder].push(newFolder);
            window.renderFiles(window.currentActiveFolder);
        };

        window.triggerAddFile = async function() {
            const t = prompt("파일명 (확장자 제외):");
            if(!t) return;
            
            const isPhotoFolder = window.currentActiveFolder.includes('photos');
            const c = prompt(isPhotoFolder ? "이미지 URL:" : "내용:");
            if(!c) return;

            const newData = isPhotoFolder
                ? {type:'img', title: t + ".jpg", url:c}
                : {type:'txt', title: t + ".txt", content:c};

            try {
                await window.addDoc(window.collection(window.db, "files"), {
                    folder: window.currentActiveFolder,
                    ...newData,
                    createdAt: Date.now()
                });
            } catch(e) {
                console.error("파일 저장 오류:", e);
                alert("데이터베이스 저장에 실패했습니다. 임시로 생성됩니다.");
            }

            if(!window.config.folders[window.currentActiveFolder]) window.config.folders[window.currentActiveFolder] = [];
            window.config.folders[window.currentActiveFolder].push(newData);
            window.renderFiles(window.currentActiveFolder);
        };

        window.loadFilesFromFirebase = async function() {
            const querySnapshot = await window.getDocs(window.collection(window.db, "files"));
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                if(!window.config.folders[data.folder]) window.config.folders[data.folder] = [];
                
                const isExist = window.config.folders[data.folder].find(f => f.title === data.title);
                if(!isExist) window.config.folders[data.folder].push(data);

                if(data.type === 'folder' && !window.config.folders[data.id]) {
                    window.config.folders[data.id] = [];
                }
            });
        };
    </script>
</body>
</html>
