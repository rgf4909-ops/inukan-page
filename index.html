<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIKAN-UIN ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@1.530/neodgm/style.css">
    <style>
        :root {
            --bg-color: #080808; --kakao-yellow: #fae100; --kakao-dark: #2a2a2a;
            --wmp-bg: #c0c0c0; --wmp-border: #808080;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-color); color: #eee; font-family: 'NeoDunggeunmo', 'Gulim', sans-serif; overflow: hidden; user-select: none; cursor: url('https://win98icons.alexmeub.com/cursors/arrow.cur'), auto; }
        a, button, [onclick], .cursor-pointer, .drag-handle, .icon-item, .file-icon, .xp-btn, .wmp-btn, .start-menu-item { cursor: url('https://win98icons.alexmeub.com/cursors/pointer.cur'), pointer !important; }

        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.08; pointer-events: none; z-index: 9999; }
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.6) 100%); pointer-events: none; z-index: 9998; }
        
        /* 🌟 눈 아프지 않은 가벼운 글리치 (롤백) */
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
        .glitch-active { animation: glitch 0.3s linear infinite; filter: hue-rotate(90deg) contrast(1.5); }

        .bg-container { position: fixed; top: 0; right: 0; width: 75%; height: 100%; z-index: 1; }
        .bg-image { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.85); }
        .fade-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to right, #080808 0%, #080808 20%, transparent 80%); z-index: 2; }

        .chat-stream { position: fixed; top: -45%; left: -5%; width: 55%; height: 200%; transform: rotate(25deg); z-index: 3; overflow: hidden; pointer-events: none; mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent); }
        .chat-track { display: flex; flex-direction: column; gap: 50px; padding: 150px; animation: scrollUp 180s linear infinite; }
        @keyframes scrollUp { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        .date-line { text-align: center; margin: 20px 0; }
        .date-line span { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color: #ccc; font-family: 'Gulim'; }
        .chat-item { display: flex; width: 100%; align-items: flex-start; }
        .chat-item.left { justify-content: flex-start; }
        .chat-item.right { justify-content: flex-end; }
        .profile-box { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .profile-img { width: 45px; height: 45px; border-radius: 18px; background: #111; overflow: hidden; border: 1px solid #333; }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-size: 0.7rem; color: #666; font-family: 'Gulim'; }
        .bubble-container { max-width: 65%; margin: 0 12px; }
        .kakao-bubble { padding: 10px 14px; border-radius: 14px; font-size: 0.95rem; line-height: 1.4; box-shadow: 2px 2px 8px rgba(0,0,0,0.4); color: black; font-family: 'Dotum', '돋움', 'Gulim', sans-serif; }
        .left .kakao-bubble { background: white; border-top-left-radius: 2px; }
        .right .kakao-bubble { background: var(--kakao-yellow); border-top-right-radius: 2px; }

        /* 공통 창 스타일 (윈도우 98) */
        .draggable { position: absolute; }
        .xp-window { background: #c0c0c0; border-top: 2px solid #fff; border-left: 2px solid #fff; border-right: 2px solid #000; border-bottom: 2px solid #000; display: flex; flex-direction: column; box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080, 5px 5px 15px rgba(0,0,0,0.5); z-index: 100; }
        .xp-title-bar { background: linear-gradient(to right, #000080, #1084d0); height: 22px; display: flex; align-items: center; justify-content: space-between; padding: 0 3px; color: white; font-weight: bold; font-size: 11px; cursor: move; }
        .xp-close-btn { width: 16px; height: 16px; background: #c0c0c0; border-top: 1px solid #fff; border-left: 1px solid #fff; border-right: 1px solid #000; border-bottom: 1px solid #000; display: flex; align-items: center; justify-content: center; font-size: 10px; color: black; font-weight: bold; box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080; cursor: pointer; }
        .xp-close-btn:active { border-top: 1px solid #000; border-left: 1px solid #000; border-right: 1px solid #fff; border-bottom: 1px solid #fff; box-shadow: inset 1px 1px #808080, inset -1px -1px #dfdfdf; padding: 1px 0 0 1px; }

        .desktop-icons { position: fixed; top: 40px; left: 40px; display: flex; flex-direction: column; gap: 30px; z-index: 10; }
        .icon-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 70px; }
        .icon-img { width: 45px; height: 45px; margin-bottom: 5px; filter: drop-shadow(2px 2px 2px black); }
        .icon-label { font-size: 0.85rem; color: white; text-shadow: 1px 1px 3px black; text-align: center; }

        .wmp-player { position: fixed; bottom: 40px; right: 30px; width: 320px; height: 480px; background: #c0c0c0; border-top: 2px solid #fff; border-left: 2px solid #fff; border-right: 2px solid #000; border-bottom: 2px solid #000; z-index: 1000; display: flex; flex-direction: column; box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080; }
        .wmp-title { background: linear-gradient(to right, #000080, #1084d0); height: 22px; padding: 0 3px; display: flex; align-items: center; color: white; font-size: 11px; font-weight: bold; gap: 5px; cursor: move; }
        .wmp-menu { color: black; font-size: 11px; padding: 2px 5px; }
        .wmp-screen { flex: 1; background: black; margin: 5px; border: 2px inset #808080; position: relative; overflow: hidden; }
        .album-cover { width: 100%; height: 200px; object-fit: cover; }
        .wmp-info-panel { height: 120px; background: black; color: #00ff00; font-family: 'Gulim', monospace; font-size: 0.7rem; padding: 10px; border-top: 1px solid #444; line-height: 1.6; }
        .wmp-buttons { display: flex; gap: 5px; margin: 5px; }
        .wmp-btn { background: #c0c0c0; border-top: 1px solid #fff; border-left: 1px solid #fff; border-right: 1px solid #000; border-bottom: 1px solid #000; width: 30px; height: 25px; display: flex; align-items: center; justify-content: center; color: black; cursor: pointer; box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080; }
        .wmp-btn:active { border-top: 1px solid #000; border-left: 1px solid #000; border-right: 1px solid #fff; border-bottom: 1px solid #fff; box-shadow: inset 1px 1px #808080, inset -1px -1px #dfdfdf; padding: 1px 0 0 1px; }

        #xpExplorer { top: 80px; left: 20%; width: 900px; height: 600px; display: none; }
        .xp-menubar { background: #c0c0c0; padding: 2px 8px; font-size: 11px; color: black; display: flex; gap: 15px; border-bottom: 1px solid #808080; box-shadow: 0 1px #fff; font-family:'Gulim'; }
        .xp-toolbar { background: #c0c0c0; padding: 4px 8px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #808080; box-shadow: 0 1px #fff; }
        .xp-toolbar-btn { display: flex; align-items: center; gap: 4px; padding: 4px 8px; cursor: pointer; color: black; font-size: 11px; border: 1px solid transparent; font-family:'Gulim'; }
        .xp-addressbar { background: #c0c0c0; padding: 4px 8px; display: flex; align-items: center; gap: 10px; color: black; font-size: 11px; border-bottom: 1px solid #808080; box-shadow: 0 1px #fff; font-family:'Gulim'; }
        .address-input-box { flex: 1; background: white; border: 2px inset #d4d0c8; display: flex; align-items: center; padding: 2px 5px; height: 24px; }
        
        .xp-body { display: flex; flex: 1; overflow: hidden; background: #fff; }
        .xp-sidebar { width: 220px; background: #c0c0c0; padding: 12px; border-right: 1px solid #808080; overflow-y: auto; }
        .sidebar-panel { background: white; border-radius: 3px; margin-bottom: 15px; overflow: hidden; font-family: 'Gulim'; }
        .sidebar-header { background: linear-gradient(to right, #ffffff, #c4d5fd); color: #2151dc; font-weight: bold; padding: 5px 10px; font-size: 11px; }
        .sidebar-content { padding: 10px; background: #d3e5fa; font-size: 11px; display: flex; flex-direction: column; gap: 8px; }
        .sidebar-item { display: flex; align-items: center; gap: 6px; color: #2151dc; cursor: pointer; }
        .sidebar-item:hover { text-decoration: underline; color: #428eff; }
        
        .xp-main-view { flex: 1; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); grid-auto-rows: min-content; gap: 15px; overflow-y: auto; background: white; align-content: start; }
        .file-icon { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px; cursor: pointer; padding: 8px; border: 1px solid transparent; }
        .file-icon.selected { background: #000080; outline: 1px dotted #808080; }
        .file-icon img { width: 48px; height: 48px; }
        .file-name { font-size: 11px; color: black; line-height: 1.2; word-break: break-all; padding: 2px 4px; font-family:'Gulim'; }
        .file-icon.selected .file-name { color: white; background: transparent; }
        
        .inline-rename-input { font-family: 'Gulim'; font-size: 11px; text-align: center; padding: 1px; border: 1px solid black; background: white; color: black; width: 90px; outline: none; }

        .xp-btn { background: #c0c0c0; border-top: 1px solid #fff; border-left: 1px solid #fff; border-right: 1px solid #000; border-bottom: 1px solid #000; padding: 3px 20px; font-size: 11px; box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080; cursor: pointer; color: black; margin: 0 5px; font-family:'Gulim'; }
        .xp-btn:active { border-top: 1px solid #000; border-left: 1px solid #000; border-right: 1px solid #fff; border-bottom: 1px solid #fff; box-shadow: inset 1px 1px #808080, inset -1px -1px #dfdfdf; padding: 4px 19px 2px 21px; }

        .d-day-widget { position: absolute; top: 30px; right: 40px; z-index: 10; text-align: right; }
        .d-day-label { font-size: 14px; color: #aaa; letter-spacing: 2px; text-shadow: 1px 1px 2px #000; }
        #ddayCount { font-size: 3rem; color: #fff; letter-spacing: 2px; text-shadow: 2px 2px 0px #000, -1px -1px 0px rgba(255,255,255,0.3); margin-top: 5px; }

        .taskbar { position: fixed; bottom: 0; left: 0; width: 100%; height: 28px; background: #c0c0c0; border-top: 2px solid #dfdfdf; box-shadow: inset 0 1px #fff; display: flex; justify-content: space-between; align-items: center; z-index: 10000; padding: 2px; font-family:'Gulim'; }
        .start-btn { height: 100%; padding: 0 6px; display: flex; align-items: center; gap: 4px; background: #c0c0c0; border-top: 1px solid #fff; border-left: 1px solid #fff; border-right: 1px solid #000; border-bottom: 1px solid #000; box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080; font-weight: bold; font-size: 11px; color: black; }
        .start-btn:active { border-top: 1px solid #000; border-left: 1px solid #000; border-right: 1px solid #fff; border-bottom: 1px solid #fff; box-shadow: inset 1px 1px #808080, inset -1px -1px #dfdfdf; padding: 1px 5px -1px 7px; }
        .taskbar-tray { height: 100%; padding: 0 8px; display: flex; align-items: center; border-top: 1px solid #808080; border-left: 1px solid #808080; border-right: 1px solid #fff; border-bottom: 1px solid #fff; font-size: 11px; color: black; gap: 5px; background: #c0c0c0; }

        .start-menu { position: fixed; bottom: 28px; left: 0; width: 200px; background: #c0c0c0; border-top: 1px solid #fff; border-left: 1px solid #fff; border-right: 1px solid #000; border-bottom: 1px solid #000; box-shadow: inset 1px 1px #dfdfdf, inset -1px -1px #808080, 5px 5px 10px rgba(0,0,0,0.5); z-index: 9999; display: none; flex-direction: row; color: black; font-family:'Gulim'; }
        .start-menu-sidebar { width: 30px; background: linear-gradient(to bottom, #000080, #1084d0); display: flex; align-items: flex-end; padding-bottom: 5px; }
        .start-menu-sidebar span { color: white; font-weight: bold; transform: rotate(-90deg); transform-origin: left bottom; white-space: nowrap; font-size: 14px; margin-left: 5px; margin-bottom: 60px; letter-spacing: 2px; font-family:'Tahoma'; }
        .start-menu-items { flex: 1; padding: 2px; display: flex; flex-direction: column; }
        .start-menu-item { padding: 8px 10px; display: flex; align-items: center; gap: 10px; font-size: 11px; cursor: pointer; }
        .start-menu-item:hover { background: #000080; color: white; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #808080; border-top: 2px solid #808080; border-left: 2px solid #808080; border-right: 2px solid #fff; border-bottom: 2px solid #fff; margin: 10px; font-family:'Gulim'; }
        .cal-header { background: #c0c0c0; text-align: center; font-size: 11px; padding: 5px; font-weight: bold; color: black; }
        .cal-day { background: white; height: 50px; padding: 3px; font-size: 11px; color: black; display: flex; flex-direction: column; overflow: hidden; cursor:pointer;}
        .cal-day.empty { background: #e0e0e0; cursor:default; }
        .cal-day:hover:not(.empty) { background: #000080; color:white; }
        .memo-badge { background: #ff3366; color: white; font-size: 9px; padding: 1px 3px; border-radius: 2px; margin-top: 2px; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; font-family:'Gulim';}

        #messengerScroll::-webkit-scrollbar, #logScroll::-webkit-scrollbar { width: 14px; }
        #messengerScroll::-webkit-scrollbar-thumb, #logScroll::-webkit-scrollbar-thumb { background: #c0c0c0; border-top: 1px solid #fff; border-left: 1px solid #fff; border-right: 1px solid #000; border-bottom: 1px solid #000; }
        #messengerScroll::-webkit-scrollbar-track, #logScroll::-webkit-scrollbar-track { background: #dfdfdf; border-left: 1px solid #808080; border-right: 1px solid #fff; }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

        const firebaseConfig = { apiKey: "AIzaSyAzy2_YfNKk2vPzU6l1AwjCC1_TepXYAsU", authDomain: "inukan-19e53.firebaseapp.com", projectId: "inukan-19e53", storageBucket: "inukan-19e53.firebasestorage.app", messagingSenderId: "1035051352954", appId: "1:1035051352954:web:a06a37592846ac41710cc3" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db; window.addDoc = addDoc; window.getDocs = getDocs; window.deleteDoc = deleteDoc; window.updateDoc = updateDoc; window.doc = doc; window.collection = collection; window.setDoc = setDoc;

        window.config = {
            profiles: { jikan: "https://i.postimg.cc/wjYnMhTH/jikanpeusa.png", jiuin: "https://i.postimg.cc/QVGYB3D4/peusa.png" },

                { sender: "지칸", text: "여유 부리면서 쳐웃지 마라. 꼴받으니까.", side: "left" }

        window.currentActiveFolder = '';

        window.init = async function() {
            window.calcDDay();

            window.spawnCIHVirus(); 
            window.updateClock(); setInterval(window.updateClock, 1000); 
            window.initGlobalClickSound();

            try { 
                await window.loadFilesFromFirebase();

                // notifSound가 완전히 로드된 뒤 알림 실행
                setTimeout(()=>window.checkTodayMemo(), 800);

            window.initDailyMsg();
        };

        window.initGlobalClickSound = function() {
            // 첫 사용자 인터랙션 시 notifSound 언락
            let _notifUnlocked = false;
            function _unlockNotifSound() {
                if(_notifUnlocked) return;
                _notifUnlocked = true;
                const ns = document.getElementById('notifSound');
                if(ns) { ns.volume=0; ns.play().then(()=>{ ns.pause(); ns.currentTime=0; ns.volume=1; }).catch(()=>{}); }
            }
            document.addEventListener('mousedown', (ev) => {
                _unlockNotifSound();
                const sound = document.getElementById('clickSound');
                if(sound) { sound.currentTime = 0; sound.play().catch(()=>{}); }
            });
            // 타자/엔터/스페이스/백스페이스 효과음
            let _typeTimer = null;
            function _playSfx(id) {
                const snd = document.getElementById(id);
                if(!snd) return;
                snd.pause(); snd.currentTime = 0; snd.play().catch(()=>{});
            }
            function _playTypeSound() {
                const snd = document.getElementById('typeSound');
                if(snd) {
                    clearTimeout(_typeTimer);
                    // 재생 중이 아닐 때만 처음부터 시작 - 재생 중이면 그냥 계속 흘러가게 둠
                    if(snd.paused) {
                        snd.currentTime = 0;
                        snd.play().catch(()=>{});
                    }
                    // 마지막 타자 후 800ms 지나면 정지
                    _typeTimer = setTimeout(() => { snd.pause(); snd.currentTime = 0; }, 800);
                }
            }
            document.addEventListener('keydown', (e) => {
                const tag = document.activeElement?.tagName?.toLowerCase();
                const isEditable = tag === 'input' || tag === 'textarea' || document.activeElement?.isContentEditable;
                if(!isEditable) return;
                if(e.key === 'Enter') {
                    _playSfx('enterSound');
                } else if(e.key === ' ') {
                    _playSfx('enterSound');
                } else if(e.key === 'Backspace' || e.key === 'Delete') {
                    _playSfx('backspaceSound');
                } else if(!e.isComposing && e.key.length === 1) {
                    // 영문/숫자/특수문자 (한글 조합 중엔 스킵 - compositionupdate에서 처리)
                    _playTypeSound();
                }
            });
            // 한글 IME 조합 입력 시 타자 소리 (compositionupdate: 글자 바뀔 때마다 발생)
            document.addEventListener('compositionupdate', (e) => {
                const tag = document.activeElement?.tagName?.toLowerCase();
                const isEditable = tag === 'input' || tag === 'textarea' || document.activeElement?.isContentEditable;
                if(!isEditable) return;
                _playTypeSound();
            });
        };

        window.initGlitchEffect = function() {
            setInterval(() => {
                if(Math.random() > 0.9) {
                    document.body.classList.add('glitch-active');
                    setTimeout(() => document.body.classList.remove('glitch-active'), 300);
                }
            }, 2000); 
        };

        window.calcDDay = function() {
            const startDate = new Date("2025-12-10T00:00:00").getTime();
            const today = new Date().getTime(); 
            const diff = Math.floor((today - startDate) / (1000 * 60 * 60 * 24)); 
            document.getElementById('ddayCount').innerText = diff >= 0 ? `D+${diff}` : `D${diff}`;
        };

        window.updateClock = function() {
            const d = new Date();
            let h = d.getHours(); const m = d.getMinutes().toString().padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
            document.getElementById('taskbarClock').innerText = `${ampm} ${h}:${m}`;
        };

        window.toggleStartMenu = function() {
            const m = document.getElementById('startMenu');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        };

        window.playMusic = function() { document.getElementById('musicFrame').src = "https://www.youtube.com/embed/XCliKS4XlWc?autoplay=1&mute=0&loop=1&playlist=XCliKS4XlWc"; };
        window.stopMusic = function() { document.getElementById('musicFrame').src = ""; };

        window.initChatLoop = function() {
            const track = document.getElementById('chatTrack'); track.innerHTML = '';
            const repeatedChats = Array(15).fill(window.config.chats).flat();
            repeatedChats.forEach(chat => {
                if (chat.type === 'date') {
                    const dl = document.createElement('div'); dl.className = 'date-line'; dl.innerHTML = `<span>${chat.text}</span>`; track.appendChild(dl);
                } else {
                    const item = document.createElement('div'); item.className = `chat-item ${chat.side}`;
                    const prof = `<div class="profile-box"><div class="profile-img"><img src="${chat.side === 'left' ? window.config.profiles.jikan : window.config.profiles.jiuin}"></div><span class="profile-name">${chat.sender}</span></div>`;
                    const bub = `<div class="bubble-container"><div class="kakao-bubble">${chat.text}</div></div>`;
                    item.innerHTML = chat.side === 'left' ? prof + bub : bub + prof; track.appendChild(item);
                }
            });
        };

        window.spawnCIHVirus = function() {
            const layer = document.getElementById('virusPopups');
            const virusImgUrl = "https://upload.wikimedia.org/wikipedia/commons/0/07/CIH.png";
            // 저장된 위치 불러오기
            let savedPositions = [];
            try { savedPositions = JSON.parse(localStorage.getItem('virusPositions') || '[]'); } catch(e) {}
            for(let i=0; i<3; i++) {
                const saved = savedPositions[i];
                const popup = document.createElement('div');
                popup.className = 'xp-window draggable';
                popup.style.zIndex = '500';
                popup.style.width = '320px';
                popup.style.position = 'fixed';
                if(saved) {
                    popup.style.left = saved.x + 'px';
                    popup.style.top  = saved.y + 'px';
                } else {
                    popup.style.right  = (50 + (i * 30)) + 'px';
                    popup.style.bottom = (80 + (i * 40)) + 'px';
                }
                popup.dataset.virusIdx = i;
                popup.innerHTML = `
                    <div class="xp-title-bar drag-handle"><span>Warning</span><div class="xp-close-btn" onclick="this.parentElement.parentElement.remove()">✕</div></div>
                    <div style="padding:0; background:black; border-bottom:2px solid #fff;"><img src="${virusImgUrl}" style="width:100%; display:block; border:1px solid #808080;"></div>
                `;
                // 드래그 후 위치 저장 (mouseup 시)
                popup.addEventListener('mouseup', () => {
                    const allPopups = document.querySelectorAll('[data-virus-idx]');
                    const positions = [];
                    allPopups.forEach(p => {
                        const rect = p.getBoundingClientRect();
                        positions[parseInt(p.dataset.virusIdx)] = { x: rect.left, y: rect.top };
                    });
                    localStorage.setItem('virusPositions', JSON.stringify(positions));
                });
                layer.appendChild(popup);
            }
        };

        window.openCalendar = function() {
            document.getElementById('clickSound').play().catch(()=>{});
            if(document.getElementById('calendarWindow')) return;
            const popup = document.createElement('div');
            popup.className = 'xp-window draggable'; popup.id = 'calendarWindow';
            popup.style.cssText = `top:150px;left:30%;width:460px;position:absolute;z-index:1000;display:flex;flex-direction:column;overflow:visible;`;
            popup.innerHTML = `
                <div class="xp-title-bar drag-handle">

                    <div class="xp-close-btn" onclick="document.getElementById('calendarWindow').remove()">✕</div>
                </div>
                <div style="padding:8px 10px;display:flex;justify-content:space-between;align-items:center;background:#c0c0c0;border-bottom:1px solid #808080;">

                </div>
                <div class="calendar-grid" id="calGrid"></div>`;
            document.body.appendChild(popup);
            window.makeResizable(popup);
            window.renderCalendar();
        };

        window.changeMonth = function(offset) { window.calDate.setMonth(window.calDate.getMonth() + offset); window.renderCalendar(); };

        window.renderCalendar = function() {
            const grid = document.getElementById('calGrid'); if(!grid) return;
            const year = window.calDate.getFullYear(); const month = window.calDate.getMonth();
            document.getElementById('calMonthYear').innerText = `${year}년 ${month+1}월`;
            const firstDay = new Date(year,month,1).getDay(); const daysInMonth = new Date(year,month+1,0).getDate();
            let html = ['일','월','화','수','목','금','토'].map(d=>`<div class="cal-header">${d}</div>`).join('');
            for(let i=0;i<firstDay;i++) html+=`<div class="cal-day empty"></div>`;
            const today = new Date();
            for(let i=1;i<=daysInMonth;i++){
                const key=`${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const isToday=(year===today.getFullYear()&&month===today.getMonth()&&i===today.getDate());
                const hasMemo=window.config.calendar[key];
                const bg=isToday?'#444':'white'; const color=isToday?'white':'black';
                const badge=hasMemo?`<div class="memo-badge" style="background:#555;color:white;">${hasMemo.split('\n')[0].substring(0,14)}</div>`:'';
                html+=`<div class="cal-day" style="background:${bg};color:${color};" onclick="window.openDayDetail('${key}')"><b>${i}</b>${badge}</div>`;
            }
            grid.innerHTML=html;
        };

        window.openDayDetail = function(dateKey) {
            document.getElementById('dayDetailWin')?.remove();
            const memos = window.config.calendar[dateKey]||'';
            const p = document.createElement('div'); p.className='xp-window draggable'; p.id='dayDetailWin';

        window.saveDayMemo = async function(dateKey) {

            const t=new Date();
            const key=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
            if(window.config.calendar[key] && !sessionStorage.getItem('calNotif_'+key)){
                sessionStorage.setItem('calNotif_'+key,'1');
                window.pushNotif('📅 오늘의 일정', window.config.calendar[key].substring(0,100), ()=>window.openCalendar());
            }
        };

                if(file.type === 'folder') {
                    icon.ondragover = (e) => { e.preventDefault(); icon.classList.add('selected'); };
                    icon.ondragleave = (e) => { icon.classList.remove('selected'); };
                    icon.ondrop = async (e) => {
                        e.preventDefault(); icon.classList.remove('selected');
                        const draggedDocId = e.dataTransfer.getData('text/plain');
                        if(draggedDocId && draggedDocId !== file.docId) { await window.moveFileToFolder(draggedDocId, file.id); }

        window._photoAddHandleFiles = async function(input) {
            const prog = document.getElementById('photoAddProgress');
            if(prog) { prog.style.display='block'; prog.textContent='변환 중...'; }
            const files = Array.from(input.files);
            for(const file of files) {
                await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = async e => {
                        // Canvas로 리사이즈해서 Firestore 1MB 한도 맞춤
                        const img = new Image();
                        img.onload = async () => {
                            const MAX = 800; // 최대 800px
                            let w = img.width, h = img.height;
                            if(w > MAX || h > MAX) {
                                if(w >= h) { h = Math.round(h * MAX / w); w = MAX; }
                                else       { w = Math.round(w * MAX / h); h = MAX; }
                            }
                            const canvas = document.createElement('canvas');
                            canvas.width = w; canvas.height = h;
                            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                            // quality 0.75로 JPEG 압축
                            const b64 = canvas.toDataURL('image/jpeg', 0.75);
                            if(prog) prog.textContent = `저장 중... (${file.name})`;
                            const newData = { type:'img', title: file.name || '새 이미지.jpg', url: b64, folder: window.currentActiveFolder };
                            try {
                                const docRef = await window.addDoc(window.collection(window.db, "files"), newData); newData.docId = docRef.id;
                                if(!window.config.folders[window.currentActiveFolder]) window.config.folders[window.currentActiveFolder] = [];
                                window.config.folders[window.currentActiveFolder].push(newData);
                            } catch(err) {
                                alert(`업로드 실패: ${file.name}\n(파일이 너무 크거나 연결 문제)`);
                            }
                            resolve();
                        };
                        img.onerror = () => resolve();
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            }
            window.renderFiles(window.currentActiveFolder);
            if(prog) prog.style.display='none';
            document.getElementById('photoAddDlg')?.remove();
        };

        // 🌟 수정된 로그 파싱 로직: 정규식 더 관대하게 수정 & 바탕체 적용
        window.parseLogTextToHTML = function(content) {
            if(!content) return '<div style="color:#aaa;font-family:Gulim;font-size:12px;padding:20px;text-align:center;">아직 기록이 없습니다.</div>';
            const blocks = content.split('\n\n').filter(b => b.trim());
            let html = ''; let lastDate = '';

            blocks.forEach(block => {
                // [날짜 시간] 이름 : 내용  OR  [날짜미상] 이름 : 내용  (시간 없어도 OK)
                const m = block.match(/^\[([^\]]*)\]\s*(.+?)\s*:\s*([\s\S]*)$/);
                if(m) {
                    const bracket = m[1].trim();
                    const name    = m[2].trim();
                    const text    = m[3].trim();

                    const dtm = bracket.match(/(\d{4}\.\d{2}\.\d{2})\.?\s*(\d{2}:\d{2})/);
                    const dateStr = dtm ? dtm[1] : '';
                    const timeStr = dtm ? dtm[2] : '';

                    if(dateStr && dateStr !== lastDate) {
                        html += `<div style="text-align:center;margin:18px 0 10px;">
                            <span style="background:#e8e8e8;padding:3px 14px;border-radius:20px;color:#888;font-size:11px;font-family:Gulim;">${dateStr}</span>
                        </div>`;
                        lastDate = dateStr;
                    }

                    const isRight = (name === '지우인');
                    const imgSrc  = name === '지칸'  ? window.config.profiles.jikan
                                  : name === '지우인' ? window.config.profiles.jiuin
                                  : window.config.profiles.jikan;

                    html += `
                    <div style="display:flex;align-items:flex-start;margin-bottom:14px;flex-direction:${isRight?'row-reverse':'row'};">
                        <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;${isRight?'margin-left:8px;':'margin-right:8px;'}">
                            <img src="${imgSrc}" style="width:42px;height:42px;border-radius:14px;border:1px solid #ddd;object-fit:cover;">
                            <span style="font-size:10px;color:#888;margin-top:2px;font-family:Gulim;user-select:none;">${name}</span>
                        </div>
                        <div style="display:flex;flex-direction:column;max-width:68%;align-items:${isRight?'flex-end':'flex-start'};">
                            <div style="background:${isRight?'#fae100':'#f5f5f5'};padding:10px 14px;border-radius:${isRight?'14px 2px 14px 14px':'2px 14px 14px 14px'};font-size:13px;color:#111;word-break:break-word;box-shadow:1px 1px 4px rgba(0,0,0,0.08);font-family:'Batang','BatangChe',serif;line-height:1.65;user-select:text;-webkit-user-select:text;">
                                ${text.replace(/\n/g,'<br>')}
                            </div>
                            ${timeStr?`<span style="font-size:10px;color:#bbb;margin-top:3px;font-family:Gulim;user-select:none;">${timeStr}</span>`:''}
                        </div>
                    </div>`;
                } else {
                    html += `<div style="margin-bottom:8px;font-family:Gulim;font-size:11px;color:#ccc;">${block.replace(/\n/g,'<br>')}</div>`;
                }
            });
            return html;
        };

        // 🌟 수정된 자동 변환기: 오류 나지 않게 빈 줄 처리 강화
        // ✅ 카페 댓글 복붙 → 저장 포맷 변환
        // 양식: 프로필\n닉네임(작성자)\n날짜시간답글\n내용...
        window.formatRawToStandard = function(rawText) {
            if(!rawText || !rawText.trim()) return '';
            // 이미 변환된 포맷이면 그대로
            if(rawText.trim().match(/^\[\d{4}/)) return rawText.trim();

            const lines = rawText.split('\n');
            const SKIP = new Set(['프로필','답글','수정','삭제','수정|삭제','좋아요','신고']);
            const isDateLine = s => /\d{4}\.\d{2}\.\d{2}/.test(s);
            const isSkipLine = s => { const t=s.trim(); return SKIP.has(t) || isDateLine(t) || t===''; };
            const isNameLine = s => {
                const t = s.trim().replace('작성자','').trim();
                return t.length>=2 && t.length<=15 && /^[가-힣a-zA-Z0-9_\-]+$/.test(t) && !isDateLine(t) && !SKIP.has(t);
            };

            const results = [];
            let i = 0;

            while(i < lines.length) {
                const line = lines[i].trim();

                if(line === '프로필') {
                    i++;
                    // 빈 줄 스킵
                    while(i < lines.length && lines[i].trim() === '') i++;
                    if(i >= lines.length) break;

                    // 닉네임 라인 확인
                    if(!isNameLine(lines[i])) continue;
                    const name = lines[i].trim().replace('작성자','').trim();
                    i++;

                    // 날짜/스킵 줄 처리
                    let date = '';
                    while(i < lines.length && isSkipLine(lines[i])) {
                        const dm = lines[i].trim().match(/(\d{4}\.\d{2}\.\d{2})\.?\s*(\d{2}:\d{2})/);
                        if(dm) date = `${dm[1]} ${dm[2]}`;
                        i++;
                    }

                    // 내용 수집 → 다음 '프로필'까지
                    const content = [];
                    while(i < lines.length && lines[i].trim() !== '프로필') {
                        const l = lines[i].trim();
                        i++;
                        if(isSkipLine(l)) continue;
                        // 앞에 붙은 상대방 이름 태그 제거
                        let txt = l;
                        const tag = txt.match(/^([가-힣a-zA-Z]{2,10})\s+(.+)$/);
                        if(tag && tag[1] !== name && isNameLine(tag[1])) txt = tag[2].trim();
                        if(txt) content.push(txt);
                    }
                    if(content.length) results.push({name, date, text: content.join('\n')});
                } else {
                    i++;
                }
            }

            if(!results.length) return rawText.trim();
            return results.map(r=>`[${r.date||'날짜미상'}] ${r.name} : ${r.text}`).join('\n\n');
        };

        window.initDraggable = function() {
            let ae=null,ix,iy,cx,cy;

                // 어떤 draggable 창이든 클릭하면 맨 위로
                const win=e.target.closest('.draggable');
                if(win){
                    const cur=parseInt(win.style.zIndex)||100;
                    // 모든 창 중 최대 zIndex 찾기
                    let maxZ=cur;
                    document.querySelectorAll('.draggable').forEach(el=>{maxZ=Math.max(maxZ,parseInt(el.style.zIndex)||100);});
                    if(cur<maxZ) win.style.zIndex=maxZ+1;
                }
                if(e.target.closest('.drag-handle')){
                    ae=e.target.closest('.draggable');
                    ix=e.clientX-(ae.dataset.x||0); iy=e.clientY-(ae.dataset.y||0);
                    ae.style.zIndex=parseInt(ae.style.zIndex||100)+1;
                }
            });
            document.addEventListener('mousemove',e=>{
                if(ae){e.preventDefault();cx=e.clientX-ix;cy=e.clientY-iy;
                    ae.dataset.x=cx;ae.dataset.y=cy;ae.style.transform=`translate3d(${cx}px,${cy}px,0)`;}

            document.addEventListener('mouseup',()=>{ae=null;});

            el.appendChild(h);
            let sx,sy,sw,sh;
            h.addEventListener('mousedown',e=>{
                e.stopPropagation();e.preventDefault();
                sx=e.clientX;sy=e.clientY;sw=el.offsetWidth;sh=el.offsetHeight;
                const mv=e=>{el.style.width=Math.max(280,sw+(e.clientX-sx))+'px';el.style.height=Math.max(180,sh+(e.clientY-sy))+'px';};

        // 🔍 검색
        window._ss={};
        window.searchLog=function(pid,q){
            const s=document.getElementById(`logScroll-${pid}`),c=document.getElementById(`sc-${pid}`);
            if(!s||s.dataset.editing==='true')return;
            s.querySelectorAll('mark.hl').forEach(m=>m.replaceWith(document.createTextNode(m.textContent)));
            s.normalize();
            if(!q.trim()){if(c)c.textContent='';window._ss[pid]=null;return;}
            const rx=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
            const w=document.createTreeWalker(s,NodeFilter.SHOW_TEXT);
            const hits=[];let nd;
            while((nd=w.nextNode())){let m;while((m=rx.exec(nd.textContent))!==null)hits.push({nd,i:m.index,l:m[0].length});}
            for(let i=hits.length-1;i>=0;i--){
                const{nd,i:idx,l}=hits[i];nd.splitText(idx+l);const mid=nd.splitText(idx);
                const mk=document.createElement('mark');mk.className='hl';mk.style.cssText='background:#ffff00;color:#000;';mk.textContent=mid.textContent;
                mid.parentNode.replaceChild(mk,mid);
            }
            window._ss[pid]={idx:-1,total:hits.length};
            if(c)c.textContent=hits.length?`${hits.length}건`:'없음';
            if(hits.length)window.searchNav(pid,1);

            const s=document.getElementById(`logScroll-${pid}`),c=document.getElementById(`sc-${pid}`),st=window._ss[pid];

            st.idx=(st.idx+dir+marks.length)%marks.length;

        window._bmSave=async function(pid){
            const docId=window._bmDocMap[pid]; if(!docId||docId.startsWith('doc-'))return;
            const bms=window._bm[pid]||[];
            try{ await window.updateDoc(window.doc(window.db,'files',docId),{bookmarks:JSON.stringify(bms)}); }catch(e){}
        };
        window._bmLoad=function(pid){
            const docId=window._bmDocMap[pid]; if(!docId)return;
            const f=window.findFileByDocId(docId); if(!f||!f.bookmarks)return;
            try{
                const bms=JSON.parse(f.bookmarks);
                window._bm[pid]=bms;
                const scroll=document.getElementById(`logScroll-${pid}`);
                if(scroll){
                    bms.forEach(b=>{
                        const walker=document.createTreeWalker(scroll,NodeFilter.SHOW_TEXT);
                        const target=b.text.replace(/…$/,'');
                        let nd;
                        while((nd=walker.nextNode())){
                            const idx=nd.textContent.indexOf(target);
                            if(idx>=0){
                                try{

            win98:   {label:'윈도우98',   css:'WIN98'},
        };
        const EFFECTS={
            none:   {label:'없음',   filter:'none'},
            sepia:  {label:'세피아', filter:'sepia(0.8)'},
            bw:     {label:'흑백',   filter:'grayscale(1)'},
            vintage:{label:'빈티지', filter:'sepia(0.4) contrast(1.1) brightness(0.95)'},
            fade:   {label:'페이드', filter:'opacity(0.8) brightness(1.1) saturate(0.7)'},
            pin:    {label:'핀',     filter:'none', extra:'pin'},
            tape:   {label:'테이프', filter:'none', extra:'tape'},
        };
        // 4. 스티커에 배경과 동일한 노이즈+비네트 효과
        const STICKER_OVERLAY_CSS = `
            position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;
            background:url('https://grainy-gradients.vercel.app/noise.svg');
            opacity:0.10;mix-blend-mode:multiply;
        `;
        const STICKER_VIGNETTE_CSS = `
            position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4;
            background:radial-gradient(circle, transparent 55%, rgba(0,0,0,0.35) 100%);
        `;

        // 스타일 선택 팝업 (편집 전용 - 붙이기 직후에는 바로 붙임)
        window._openStickerDialog=function(src, currentFrame, currentEffect, onConfirm){
            document.getElementById('stickerDialog')?.remove();
            const dlg=document.createElement('div');
            dlg.id='stickerDialog';
            dlg.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #000;border-bottom:2px solid #000;width:340px;font-family:Gulim;z-index:99998;box-shadow:5px 5px 15px rgba(0,0,0,0.5);';
            dlg._selectedFrame = currentFrame || 'none';
            dlg._selectedEffect = currentEffect || 'none';

            const mkBtn=(k,v,type,cur)=>{
                const sel=k===cur;
                return `<button data-${type}="${k}" onclick="window._previewFrame_dlg && window._previewFrame_dlg('${k}','${type}',this)" style="padding:2px 7px;font-family:Gulim;font-size:10px;cursor:pointer;background:${sel?'#000080':'#c0c0c0'};color:${sel?'white':'black'};border-top:1px solid ${sel?'#808080':'#fff'};border-left:1px solid ${sel?'#808080':'#fff'};border-right:1px solid ${sel?'#fff':'#808080'};border-bottom:1px solid ${sel?'#fff':'#808080'};">${v.label}</button>`;
            };
            const frameButtons = Object.entries(FRAMES).map(([k,v])=>mkBtn(k,v,'frame',dlg._selectedFrame)).join('');
            const effectButtons= Object.entries(EFFECTS).map(([k,v])=>mkBtn(k,v,'effect',dlg._selectedEffect)).join('');

            dlg.innerHTML=`
                <div style="background:linear-gradient(to right,#000080,#1084d0);padding:3px 8px;color:white;font-size:11px;font-weight:bold;display:flex;justify-content:space-between;align-items:center;">
                    <span>✏ 사진 편집</span>
                    <span style="cursor:pointer;font-size:13px;" id="stickerDlgClose">✕</span>
                </div>
                <div style="padding:12px;">
                    <div style="margin-bottom:10px;">
                        <div style="font-size:11px;font-weight:bold;margin-bottom:5px;">미리보기</div>
                        <div id="stickerPreview" style="background:#555;height:160px;display:flex;align-items:center;justify-content:center;overflow:visible;padding:10px;box-sizing:border-box;${FRAMES[dlg._selectedFrame].css}">
                            <img src="${src}" id="previewImg" style="max-height:140px;max-width:100%;object-fit:contain;display:block;filter:${EFFECTS[dlg._selectedEffect].filter};">
                        </div>
                    </div>
                    <div style="margin-bottom:8px;">
                        <div style="font-size:11px;font-weight:bold;margin-bottom:4px;">프레임</div>
                        <div style="display:flex;gap:4px;flex-wrap:wrap;">${frameButtons}</div>
                    </div>
                    <div style="margin-bottom:12px;">
                        <div style="font-size:11px;font-weight:bold;margin-bottom:4px;">효과</div>
                        <div style="display:flex;gap:4px;flex-wrap:wrap;">${effectButtons}</div>
                    </div>
                    <div style="margin-bottom:10px;">
                        <div style="font-size:11px;font-weight:bold;margin-bottom:4px;">크기</div>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <span style="font-size:10px;font-family:Gulim;">작게</span>
                            <input type="range" id="stickerSizeSlider" min="0.4" max="3.0" step="0.1" value="1.0"
                                style="flex:1;" oninput="document.getElementById('stickerSizeVal').textContent=Math.round(this.value*100)+'%';document.getElementById('previewImg').style.maxHeight=(140*parseFloat(this.value))+'px';">
                            <span id="stickerSizeVal" style="font-size:10px;font-family:Gulim;min-width:32px;">100%</span>
                            <span style="font-size:10px;font-family:Gulim;">크게</span>
                        </div>
                    </div>
                    <div style="display:flex;gap:6px;justify-content:flex-end;">
                        <button class="xp-btn" id="stickerDlgOk">확인</button>
                        <button class="xp-btn" id="stickerDlgCancel">취소</button>
                    </div>
                </div>`;
            document.body.appendChild(dlg);
            dlg.querySelector('#stickerDlgClose').onclick=()=>dlg.remove();
            dlg.querySelector('#stickerDlgCancel').onclick=()=>dlg.remove();
            dlg.querySelector('#stickerDlgOk').onclick=()=>{
                const slider = dlg.querySelector('#stickerSizeSlider');
                const scale = slider ? parseFloat(slider.value) : 1.0;
                onConfirm(dlg._selectedFrame||'none', dlg._selectedEffect||'none', scale);
                dlg.remove();
            };
        };
        // 다이얼로그 내 버튼 핸들러
        window._previewFrame_dlg=function(key, type, btn){
            const dlg=document.getElementById('stickerDialog'); if(!dlg)return;
            if(type==='frame') dlg._selectedFrame=key;
            else dlg._selectedEffect=key;
            // 버튼 하이라이트
            btn.closest('div').querySelectorAll('button').forEach(b=>{
                b.style.background='#c0c0c0';b.style.color='black';
                b.style.borderTop='1px solid #fff';b.style.borderLeft='1px solid #fff';
                b.style.borderRight='1px solid #808080';b.style.borderBottom='1px solid #808080';
            });
            btn.style.background='#000080';btn.style.color='white';
            btn.style.borderTop='1px solid #808080';btn.style.borderLeft='1px solid #808080';
            btn.style.borderRight='1px solid #fff';btn.style.borderBottom='1px solid #fff';
            // 미리보기 갱신
            const prev=document.getElementById('stickerPreview');
            const img=document.getElementById('previewImg');
            if(prev){ prev.style.cssText=`background:#555;height:160px;display:flex;align-items:center;justify-content:center;overflow:visible;padding:10px;box-sizing:border-box;${FRAMES[dlg._selectedFrame]?.css||''}`; }
            if(img)  img.style.filter=EFFECTS[dlg._selectedEffect]?.filter||'none';
        };

        // 2. 스티커 붙이기: 다이얼로그 없이 바로 기본값(none/none)으로 붙임
        window.addStickerFromFile=function(file){
            if(!file||!file.url)return alert('이미지 URL이 없는 파일이에요.');
            // 이미지 실제 크기 감지 후 scale 계산
            const tmpImg=new Image();
            tmpImg.onload=function(){
                const naturalW=tmpImg.naturalWidth||110;
                const scale=Math.max(0.4, Math.min(4.0, naturalW/110));
                const s={src:file.url,title:file.title||'사진',x:Math.random()*400+100,y:Math.random()*200+100,rot:0,scale:scale,frame:'none',effect:'none'};
                window._stickers.push(s); window._renderSticker(s); window.saveStickers();
            };
            tmpImg.onerror=function(){
                const s={src:file.url,title:file.title||'사진',x:Math.random()*400+100,y:Math.random()*200+100,rot:0,scale:1,frame:'none',effect:'none'};
                window._stickers.push(s); window._renderSticker(s); window.saveStickers();
            };
            tmpImg.src=file.url;
        };

        window._renderSticker=function(s){
            if(s.el)return;
            const el=document.createElement('div'); el.classList.add('sticker-wrap');
            el.style.cssText='position:fixed;z-index:5;cursor:move;user-select:none;';
            window._applyStickerStyle(el, s);
            el.style.left=s.x+'px'; el.style.top=s.y+'px'; el.style.transform=`rotate(${s.rot}deg)`; s.el=el;

            // 우클릭 메뉴
            el.addEventListener('contextmenu',e=>{
                e.preventDefault(); e.stopPropagation();
                document.getElementById('stickerCtxMenu')?.remove();
                const menu=document.createElement('div'); menu.id='stickerCtxMenu';
                menu.style.cssText=`position:fixed;top:${e.clientY}px;left:${e.clientX}px;background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #000;border-bottom:2px solid #000;z-index:99999;font-family:Gulim;font-size:12px;min-width:130px;`;
                [
                    {label:'✏ 사진 편집',   fn:()=>window._stickerEdit(el)},
                    {label:'↺ 왼쪽 회전',  fn:()=>window._stickerRotate(el,-15)},
                    {label:'↻ 오른쪽 회전',fn:()=>window._stickerRotate(el,15)},
                    {label:'− 작게',        fn:()=>window._stickerScale(el,0.8)},
                    {label:'+ 크게',        fn:()=>window._stickerScale(el,1.25)},
                    {label:'✕ 삭제',        fn:()=>window._deleteSticker(el)},
                ].forEach(item=>{
                    const div=document.createElement('div'); div.textContent=item.label;
                    div.style.cssText='padding:5px 14px;cursor:pointer;color:black;white-space:nowrap;';
                    div.onmouseenter=()=>{div.style.background='#000080';div.style.color='white';};
                    div.onmouseleave=()=>{div.style.background='';div.style.color='black';};
                    div.onclick=()=>{menu.remove();item.fn();}; menu.appendChild(div);
                });
                document.body.appendChild(menu);
                setTimeout(()=>document.addEventListener('click',()=>menu.remove(),{once:true}),10);
            });

            // 클릭으로 컨트롤 토글
            el.addEventListener('click',e=>{
                if(e.target.tagName==='SPAN')return;
                document.querySelectorAll('.sticker-ctrl').forEach(c=>{c.style.visibility='hidden';c.style.opacity='0';});
                const ctrl=el.querySelector('.sticker-ctrl');
                if(ctrl){
                    const hidden=ctrl.style.visibility==='hidden'||ctrl.style.visibility==='';
                    ctrl.style.visibility=hidden?'visible':'hidden';
                    ctrl.style.opacity=hidden?'1':'0';
                }
            });

            let dx,dy,dragging=false;
            el.addEventListener('mousedown',e=>{
                if(e.button===2)return;
                if(e.target.tagName==='SPAN')return;
                e.stopPropagation(); dragging=true; dx=e.clientX-s.x; dy=e.clientY-s.y; el.style.zIndex=99;
                const mv=ev=>{if(!dragging)return; s.x=ev.clientX-dx; s.y=ev.clientY-dy; el.style.left=s.x+'px'; el.style.top=s.y+'px';};
                const up=()=>{dragging=false; el.style.zIndex=5; window.saveStickers(); document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up);};
                document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
            });
            document.body.appendChild(el);
        };

        // 스티커 DOM 구조 생성 (frame/effect 반영)
        window._applyStickerStyle=function(el, s){
            const frameKey = s.frame||'none';
            const effectKey= s.effect||'none';
            const extra = EFFECTS[effectKey]?.extra||'';
            const filt  = EFFECTS[effectKey]?.filter || 'none';
            const sz    = 110 * (s.scale||1);
            const isWin98    = frameKey === 'win98';
            const isPolaroid = frameKey === 'polaroid';
            const fCSS = isWin98 ? '' : (FRAMES[frameKey]?.css || '');

            // 데코 (핀 / 테이프)
            const tapeColors=['rgba(255,245,120,0.65)','rgba(210,230,255,0.65)','rgba(255,210,210,0.65)','rgba(210,255,210,0.65)'];
            const tc=tapeColors[Math.floor(Math.random()*tapeColors.length)];
            const tr=(Math.random()-0.5)*25;
            const tapeDecoHTML = `<div style="position:absolute;top:-12px;left:50%;transform:translateX(-50%) rotate(${tr}deg);width:48px;height:18px;background:${tc};border-radius:2px;z-index:2;pointer-events:none;background-image:repeating-linear-gradient(90deg,rgba(255,255,255,0.3) 0px,rgba(255,255,255,0.3) 1px,transparent 1px,transparent 4px);"></div>`;
            const pinDecoHTML  = `<div style="position:absolute;top:-14px;left:50%;transform:translateX(-50%);z-index:4;pointer-events:none;"><svg width="18" height="28" viewBox="0 0 18 28" xmlns="http://www.w3.org/2000/svg"><circle cx="9" cy="7" r="6" fill="#cc2200" stroke="#881100" stroke-width="1.2"/><circle cx="7" cy="5.5" r="1.8" fill="rgba(255,255,255,0.45)"/><line x1="9" y1="13" x2="9" y2="27" stroke="#888" stroke-width="2" stroke-linecap="round"/></svg></div>`;
            let decoHTML = '';
            if(extra==='pin') decoHTML = pinDecoHTML;
            else if(extra==='tape' || isPolaroid) decoHTML = tapeDecoHTML;

            const ctrlHTML = `<div class="sticker-ctrl" style="visibility:hidden;opacity:0;position:absolute;top:-34px;left:0;display:flex;gap:2px;z-index:10;transition:opacity 0.1s;"><span onclick="event.stopPropagation();window._stickerEdit(this.closest('.sticker-wrap'))" style="background:rgba(30,30,180,0.9);color:white;padding:2px 5px;cursor:pointer;font-size:11px;border-radius:2px;">✏</span><span onclick="event.stopPropagation();window._stickerRotate(this.closest('.sticker-wrap'),-15)" style="background:rgba(0,0,0,0.7);color:white;padding:2px 5px;cursor:pointer;font-size:11px;border-radius:2px;">↺</span><span onclick="event.stopPropagation();window._stickerRotate(this.closest('.sticker-wrap'),15)" style="background:rgba(0,0,0,0.7);color:white;padding:2px 5px;cursor:pointer;font-size:11px;border-radius:2px;">↻</span><span onclick="event.stopPropagation();window._stickerScale(this.closest('.sticker-wrap'),0.8)" style="background:rgba(0,0,0,0.7);color:white;padding:2px 5px;cursor:pointer;font-size:11px;border-radius:2px;">−</span><span onclick="event.stopPropagation();window._stickerScale(this.closest('.sticker-wrap'),1.25)" style="background:rgba(0,0,0,0.7);color:white;padding:2px 5px;cursor:pointer;font-size:11px;border-radius:2px;">+</span><span onclick="event.stopPropagation();window._deleteSticker(this.closest('.sticker-wrap'))" style="background:rgba(180,0,0,0.9);color:white;padding:2px 5px;cursor:pointer;font-size:11px;border-radius:2px;">✕</span></div>`;

            if(isWin98){
                el.innerHTML=`<div style="position:relative;display:inline-block;">${decoHTML}<div style="background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #000;border-bottom:2px solid #000;box-shadow:inset 1px 1px #dfdfdf,inset -1px -1px #808080,3px 4px 12px rgba(0,0,0,0.5);"><div style="background:linear-gradient(to right,#000080,#1084d0);height:18px;display:flex;align-items:center;padding:0 3px;gap:3px;"><img src="https://win98icons.alexmeub.com/icons/png/image_file-0.png" style="width:12px;height:12px;"><span style="color:white;font-size:9px;font-family:Gulim;font-weight:bold;flex:1;overflow:hidden;white-space:nowrap;">${s.title||'사진'}</span><span style="width:13px;height:13px;background:#c0c0c0;border-top:1px solid #fff;border-left:1px solid #fff;border-right:1px solid #000;border-bottom:1px solid #000;display:flex;align-items:center;justify-content:center;font-size:9px;color:black;font-weight:bold;flex-shrink:0;">✕</span></div><div style="padding:4px;position:relative;"><img src="${s.src}" class="sticker-img" style="max-width:${sz}px;width:auto;height:auto;max-height:${sz*1.5}px;object-fit:contain;display:block;filter:${filt};border:1px inset #808080;"><div style="${STICKER_OVERLAY_CSS}"></div><div style="${STICKER_VIGNETTE_CSS}"></div></div></div>${ctrlHTML}</div>`;
            } else {
                el.innerHTML=`<div style="position:relative;display:inline-block;">${decoHTML}<div class="sticker-img-wrap" style="${fCSS}box-shadow:3px 5px 18px rgba(0,0,0,0.4);display:inline-block;position:relative;"><img src="${s.src}" class="sticker-img" style="max-width:${sz}px;width:auto;height:auto;max-height:${sz*1.5}px;object-fit:contain;display:block;filter:${filt};"><div style="${STICKER_OVERLAY_CSS}"></div><div style="${STICKER_VIGNETTE_CSS}"></div></div>${ctrlHTML}</div>`;
            }
        };

        // 편집: 다이얼로그에 현재 값 전달
        window._stickerEdit=function(el){
            const s=window._stickers.find(st=>st.el===el); if(!s)return;
            window._openStickerDialog(s.src, s.frame||'none', s.effect||'none', (frame, effect, scale)=>{
                s.frame=frame; s.effect=effect;
                if(scale !== undefined) s.scale = scale;
                window._applyStickerStyle(el, s);
                el.style.transform=`rotate(${s.rot}deg)`;
                window.saveStickers();
            });
        };
        window._stickerRotate=function(el,deg){const s=window._stickers.find(s=>s.el===el);if(!s)return;s.rot=(s.rot+deg)%360;el.style.transform=`rotate(${s.rot}deg)`;window.saveStickers();};
        window._stickerScale=function(el,f){const s=window._stickers.find(s=>s.el===el);if(!s)return;s.scale=Math.min(4,Math.max(0.2,s.scale*f));const img=el.querySelector('.sticker-img');if(img){img.style.maxWidth=110*s.scale+'px';img.style.maxHeight=110*s.scale*1.5+'px';img.style.width='auto';img.style.height='auto';}window.saveStickers();};
        window._deleteSticker=function(el){const i=window._stickers.findIndex(s=>s.el===el);if(i<0)return;window._stickers[i].el.remove();window._stickers.splice(i,1);window.saveStickers();};
        window.setAsBg=async function(file){
            if(!file.url)return alert('URL이 없어요.');
            const bgImg = document.querySelector('.bg-image');
            if(bgImg) bgImg.src = file.url;
            try{ await window.setDoc(window.doc(window.db,'settings','bgImage'),{url:file.url}); }catch(e){}
        };
        window.resetBg=async function(){
            const bgImg = document.querySelector('.bg-image');
            const defaultBg = "https://img1.daumcdn.net/thumb/R1280x0/?scode=mtistory2&fname=https%3A%2F%2Fblog.kakaocdn.net%2Fdna%2Fbo0278%2FdJMcafL32e7%2FAAAAAAAAAAAAAAAAAAAAABlHjiaQc4NH3u1mNQVjRHfd-DvmuBcNJd2YohedpmLn%2Fimg.png%3Fcredential%3DyqXZFxpELC7KVnFOS48ylbz2pIh7yKj8%26expires%3D1774969199%26allow_ip%3D%26allow_referer%3D%26signature%3DmsuoDZ%252FDOFMkyKffXpYXOGq0wjg%253D";
            if(bgImg) bgImg.src = defaultBg;
            try{ await window.setDoc(window.doc(window.db,'settings','bgImage'),{url:''}); }catch(e){}
        };

        // 🌐 인터넷 익스플로러 (클래식 IE UI + 캐릭터 검색)
        const CHAR_DATA = {
            '지칸': {
                img: window.config?.profiles?.jikan || 'https://i.postimg.cc/wjYnMhTH/jikanpeusa.png',
                info: [
                    ['이름','지칸'],['성별','남성'],['생년월일','2003. 08. 29'],
                    ['신체','198cm / 105kg'],['소속','NSI BLACK - 비공식 협상 및 회담부'],
                    ['흡연','흡연자 (타의로 금연 중)'],['특이사항','스무살 때 생긴 흉터 / 검게 변한 눈동자 / 만두귀'],
                ],
                desc:'말보다 주먹이 먼저 나가는 타입. 원초적인 욕구가 강하다. 입이 걸고 화가 많지만, 언뜻 보면 착한 구석이 있다는 평가를 받기도 한다. 지우인에 대한 소유욕이 있으나 절대 티를 내지 않는다.',
                blog: {
                    title: '지칸의 블로그',
                    desc: '방문자 수: 3,842 &nbsp;|&nbsp; 오늘: 12 &nbsp;|&nbsp; 어제: 7',
                    posts: [
                        {date:'2025.11.20', title:'...', content:'.'},

                        {date:'2025.09.14', title:'무제', content:'그냥 적어본다. 별건 없다.'},
                    ]
                }
            },
            '지우인': {
                img: window.config?.profiles?.jiuin || 'https://i.postimg.cc/QVGYB3D4/peusa.png',
                info: [
                    ['이름','지우인'],['성별','남성'],['생년월일','1997. 02. 16'],
                    ['신체','191cm / 105kg'],['소속','NSI BLACK - 사이버 안전 보안부'],

                ],
                desc:'쾌락주의. 선천적으로 감정과 감각이 둔하다. 공감능력·사회적 지능이 낮으며 이것이 본인의 컴플렉스. 어조는 나긋나긋하지만 내용은 악의적일 때가 많다. 놀리거나 비꼬기를 즐긴다.',
                blog: {
                    title: '지우인 :: 아무말',
                    desc: '방문자 수: 19,203 &nbsp;|&nbsp; 오늘: 44 &nbsp;|&nbsp; 어제: 31',
